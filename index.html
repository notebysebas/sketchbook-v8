  // ── Loft solid from selected strokes ──
  window._createLoftSolid = function(selectedStrokes){
    if(primitives.length >= PRIM_MAX){ toast('Ref cap reached ('+PRIM_MAX+')'); return; }
    if(selectedStrokes.length < 2){ toast('Select 2+ strokes for loft solid'); return; }
    var N = 48;
    var rails = [];
    var profilePts = [];
    for(var i = 0; i < selectedStrokes.length; i++){
      var s = selectedStrokes[i];
      // Resample to world-space points
      var wpts = s.pts.map(function(p){ return p.clone().applyMatrix4(s.mesh.matrixWorld); });
      if(wpts.length < 2){ toast('Stroke too short for loft solid'); return; }
      var lens = [0];
      for(var j = 1; j < wpts.length; j++) lens.push(lens[j-1] + wpts[j].distanceTo(wpts[j-1]));
      var total = lens[lens.length-1];
      if(total < 1e-6){ toast('Stroke too short for loft solid'); return; }
      var resampled = [];
      for(var si = 0; si < N; si++){
        var t = si / (N-1) * total;
        var lo = 0, hi = lens.length - 2;
        while(lo < hi){ var mid = (lo+hi)>>1; if(lens[mid+1] < t) lo = mid+1; else hi = mid; }
        var seg = lo;
        var segLen = lens[seg+1] - lens[seg];
        var alpha = segLen < 1e-10 ? 0 : (t - lens[seg]) / segLen;
        resampled.push(wpts[seg].clone().lerp(wpts[seg+1], alpha));
      }
      rails.push(resampled);
      profilePts.push(resampled.map(function(p){ return [p.x, p.y, p.z]; }));
    }
    // Centroid
    var cen = new THREE.Vector3();
    var ct = 0;
    rails.forEach(function(r){ r.forEach(function(p){ cen.add(p); ct++; }); });
    cen.divideScalar(ct);

    // Build geometry (same algo as loft IIFE)
    var M = rails.length;
    var pos = [], norms = [], idx = [];
    for(var ri = 0; ri < M; ri++){
      for(var pi = 0; pi < N; pi++){
        var p = rails[ri][pi];
        pos.push(p.x - cen.x, p.y - cen.y, p.z - cen.z);
        norms.push(0, 1, 0);
      }
    }
    for(var ri = 0; ri < M-1; ri++){
      for(var pi = 0; pi < N-1; pi++){
        var a = ri*N + pi, b = ri*N + pi+1, c = (ri+1)*N + pi, d = (ri+1)*N + pi+1;
        idx.push(a, b, c, b, d, c);
      }
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    geo.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
    geo.setIndex(idx);
    geo.computeVertexNormals();

    var grp = makePrimGroup(geo, '#ffffff');
    grp.position.copy(cen);
    scene.add(grp);
    var entry = {
      id: _primIdCounter++,
      type: 'loft',
      mesh: grp,
      color: '#ffffff',
      opacity: 1,
      visible: true,

      profilePts: profilePts,
      _rowEl: null
    };
    primitives.push(entry);
    addPrimRow(entry);
    updatePrimCount();
    showRefLayerRow();
    pushUndo({type:'prim_add', prim: entry});
    markDirty();
    toast('Loft solid added to Ref layer');
  };

  // sg-loft-solid button wiring
  document.getElementById('sg-loft-solid').addEventListener('click', function(){
    window._createLoftSolid(selectedStrokes);
  });

  // ── Show/hide loft-solid button based on selection count ──
  window._syncLoftSolidBtn = function(){
    var show = selectedStrokes.length >= 2;
    var btn = document.getElementById('sg-loft-solid');
    if(btn) btn.style.display = show ? '' : 'none';
    // Also toggle the ghud-sel / pb-ghud-sel loft-solid buttons
    document.querySelectorAll('[data-selact="loft-solid"]').forEach(function(b){
      b.style.display = show ? '' : 'none';
    });
  };

  // ── Serialization ──
  window._serializePrimitives = function(){
    return primitives.map(function(p){
      var obj = {
        id: p.id,
        type: p.type,
        color: p.color,
        opacity: p.opacity != null ? p.opacity : 1,
        visible: p.visible,
        position: [p.mesh.position.x, p.mesh.position.y, p.mesh.position.z],
        quaternion: [p.mesh.quaternion.x, p.mesh.quaternion.y, p.mesh.quaternion.z, p.mesh.quaternion.w],
        scale: [p.mesh.scale.x, p.mesh.scale.y, p.mesh.scale.z]
      };
      if(p.type === 'loft' && p.profilePts) obj.profilePts = p.profilePts;
      return obj;
    });
  };

  window._deserializePrimitives = function(arr){
    // Clear existing
    window._clearAllPrimitives();
    if(!arr || !arr.length) return;
    for(var i = 0; i < arr.length; i++){
      var d = arr[i];
      if(primitives.length >= PRIM_MAX) break;
      var grp;
      if(d.type === 'loft' && d.profilePts){
        // Reconstruct loft geometry from profile points
        var N = d.profilePts[0] ? d.profilePts[0].length : 48;
        var M = d.profilePts.length;
        var pos = [], norms = [], idx = [];
        for(var ri = 0; ri < M; ri++){
          for(var pi = 0; pi < N; pi++){
            var pt = d.profilePts[ri][pi];
            pos.push(pt[0], pt[1], pt[2]);
            norms.push(0, 1, 0);
          }
        }
        for(var ri = 0; ri < M-1; ri++){
          for(var pi = 0; pi < N-1; pi++){
            var a = ri*N + pi, b = ri*N + pi+1, c = (ri+1)*N + pi, dd2 = (ri+1)*N + pi+1;
            idx.push(a, b, c, b, dd2, c);
          }
        }
        var geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        geo.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
        geo.setIndex(idx);
        geo.computeVertexNormals();
        grp = makePrimGroup(geo, d.color || '#ffffff', d.opacity != null ? d.opacity : 1);
      } else {
        var geo = makeGeometry(d.type);
        grp = makePrimGroup(geo, d.color || '#ffffff', d.opacity != null ? d.opacity : 1);
      }
      if(d.position) grp.position.set(d.position[0], d.position[1], d.position[2]);
      if(d.quaternion) grp.quaternion.set(d.quaternion[0], d.quaternion[1], d.quaternion[2], d.quaternion[3]);
      if(d.scale) grp.scale.set(d.scale[0], d.scale[1], d.scale[2]);
      grp.updateMatrix(); grp.matrixAutoUpdate = false;
      grp.visible = d.visible !== false;
      scene.add(grp);
      var entry = {
        id: d.id || _primIdCounter++,
        type: d.type,
        mesh: grp,
        color: d.color || '#ffffff',
        opacity: d.opacity != null ? d.opacity : 1,
        visible: d.visible !== false,
  
        _rowEl: null
      };
      if(d.type === 'loft' && d.profilePts) entry.profilePts = d.profilePts;
      if(d.id >= _primIdCounter) _primIdCounter = d.id + 1;
      primitives.push(entry);
    }
    rebuildPrimRows();
    updatePrimCount();
    showRefLayerRow();
  };

  window._clearAllPrimitives = function(){
    deselectPrimitive();
    if(_primsAsPlane) togglePrimsAsPlane(false);
    while(primitives.length){
      var p = primitives.pop();
      scene.remove(p.mesh);
      p.mesh.traverse(function(c){if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose();});
    }
    var stack = document.getElementById('prim-stack');
    while(stack.firstChild) stack.removeChild(stack.firstChild);
    updatePrimCount();
    showRefLayerRow();
    // Reset select mode
    _primSelectMode = false;
    window._primSelectMode = false;
  };

  // ── Undo/redo support ──
  window._primUndoAdd = function(entry){
    // Undo of prim_add: remove the mesh
    scene.remove(entry.mesh);
    var idx = primitives.indexOf(entry);
    if(idx > -1) primitives.splice(idx, 1);
    if(entry._rowEl && entry._rowEl.parentNode) entry._rowEl.parentNode.removeChild(entry._rowEl);
    if(_selectedPrim && _selectedPrim.id === entry.id) deselectPrimitive();
    updatePrimCount();
    showRefLayerRow();
    markDirty();
  };
  window._primRedoAdd = function(entry){
    // Redo of prim_add: re-add
    scene.add(entry.mesh);
    primitives.push(entry);
    addPrimRow(entry);
    updatePrimCount();
    showRefLayerRow();
    markDirty();
  };
  window._primUndoDelete = function(entry, index){
    // Undo of prim_delete: restore
    scene.add(entry.mesh);
    primitives.splice(index, 0, entry);
    rebuildPrimRows();
    updatePrimCount();
    showRefLayerRow();
    markDirty();
  };
  window._primRedoDelete = function(entry){
    // Redo of prim_delete: remove again
    scene.remove(entry.mesh);
    var idx = primitives.indexOf(entry);
    if(idx > -1) primitives.splice(idx, 1);
    if(entry._rowEl && entry._rowEl.parentNode) entry._rowEl.parentNode.removeChild(entry._rowEl);
    if(_selectedPrim && _selectedPrim.id === entry.id) deselectPrimitive();
    updatePrimCount();
    showRefLayerRow();
    markDirty();
  };
  window._primUndoTransform = function(prim, oldPos, oldQuat, oldScale){
    prim.mesh.position.copy(oldPos);
    prim.mesh.quaternion.copy(oldQuat);
    prim.mesh.scale.copy(oldScale);
    prim.mesh.updateMatrix(); prim.mesh.matrixAutoUpdate = false;
    if(window._pgGcDraw) window._pgGcDraw();
    markDirty();
  };

  // ── Expose for page switching ──
  window._savePrimitivesForPage = function(){
    return window._serializePrimitives();
  };
  window._loadPrimitivesForPage = function(arr){
    window._deserializePrimitives(arr || []);
  };

  // ── Close prims strip in newScene ──
  window._closePrimsStrip = function(){
    var bar = document.getElementById('prim-bar');
    if(bar) bar.classList.remove('open');
    var pop = document.getElementById('prims-pop');
    if(pop) pop.classList.remove('open');
    var btn = document.getElementById('bprims');
    if(btn) btn.classList.remove('on');
    var lb = document.getElementById('prim-list-btn');
    if(lb) lb.classList.remove('on');
  };

  // ── Initial state ──
  updatePrimCount();
  showRefLayerRow();
})();


// ================================================================
//  NAVCUBE — XYZ axis orientation gizmo (Blender-style)
//  Three coloured arms from centre, label dots at tips.
//  Tap a tip dot to snap to that view. Drag to orbit.
// ================================================================
(function(){
  // Axis definitions: world direction, snap config, colour, label
  const AXES=[
    {dir:[1,0,0],  col:'#e03040',lbl:'X', snap:{phi:Math.PI/2,theta:Math.PI},       neg:{phi:Math.PI/2,theta:0}},
    {dir:[-1,0,0], col:'#e03040',lbl:'-X',snap:{phi:Math.PI/2,theta:0},              neg:{phi:Math.PI/2,theta:Math.PI}},
    {dir:[0,1,0],  col:'#22bb55',lbl:'Y', snap:{phi:Math.PI/2,theta:Math.PI/2},     neg:{phi:Math.PI/2,theta:-Math.PI/2}},
    {dir:[0,-1,0], col:'#22bb55',lbl:'-Y',snap:{phi:Math.PI/2,theta:-Math.PI/2},    neg:{phi:Math.PI/2,theta:Math.PI/2}},
    {dir:[0,0,1],  col:'#3377ee',lbl:'Z', snap:{phi:0.001,theta:-Math.PI/2},         neg:{phi:Math.PI-0.001,theta:-Math.PI/2}},
    {dir:[0,0,-1], col:'#3377ee',lbl:'-Z',snap:{phi:Math.PI-0.001,theta:-Math.PI/2}, neg:{phi:0.001,theta:-Math.PI/2}},
  ];
  const LABELS_MAP={
    'X':'RGT','-X':'LFT','Y':'BCK','-Y':'FRT','Z':'TOP','-Z':'BTM'
  };

  function setupNavCube(nc,W,H){
    // ── Tear down previous listeners if this canvas was already set up ──
    if(nc._ncCleanup) nc._ncCleanup();

    const ctx=nc.getContext('2d'),CX=W/2,CY=H/2;
    const ARM=Math.min(W,H)*0.37; // arm length in canvas px
    const DOT=Math.min(W,H)*0.10; // dot radius
    let ncDrag=null,ncLastTap=0,hovAxis=null;

    // Project a 3D world direction vector to 2D canvas coords
    function projectDir(dx,dy,dz){
      const sinPhi=Math.sin(cam.phi),cosPhi=Math.cos(cam.phi);
      const sinTheta=Math.sin(cam.theta),cosTheta=Math.cos(cam.theta);
      const rx=-sinTheta, ry=cosTheta, rz=0;
      const fx=sinPhi*cosTheta,fy=sinPhi*sinTheta,fz=cosPhi;
      const ux=fy*rz-fz*ry, uy=fz*rx-fx*rz, uz=fx*ry-fy*rx;
      const cx2=dx*rx+dy*ry+dz*rz;
      const cy2=dx*ux+dy*uy+dz*uz;
      return{x:CX+cx2*ARM, y:CY-cy2*ARM};
    }

    function hitAxis(mx,my){
      let best=-1,bestD=Infinity;
      AXES.forEach((ax,i)=>{
        const p=projectDir(ax.dir[0],ax.dir[1],ax.dir[2]);
        const d=Math.hypot(mx-p.x,my-p.y);
        if(d<DOT*2.2&&d<bestD){bestD=d;best=i;}
      });
      return best;
    }

    function isAlignedTo(phi,theta){
      var dp=Math.abs(cam.phi-phi),dt=Math.abs(cam.theta-theta);
      while(dt>Math.PI)dt=Math.abs(dt-Math.PI*2);
      return dp<0.08&&dt<0.08;
    }

    function snapTo(axIdx,goOrtho){
      var ax=AXES[axIdx];
      var targetPhi=ax.snap.phi,targetTheta=ax.snap.theta;
      if(isAlignedTo(targetPhi,targetTheta)){
        targetPhi=ax.neg.phi;targetTheta=ax.neg.theta;
      }
      cam.phi=targetPhi;cam.theta=targetTheta;
      updCam();
      if(goOrtho)setOrtho(true);
      else if(useOrtho)setOrtho(false);
      toast(LABELS_MAP[ax.lbl]||ax.lbl);
    }

    function draw(){
      ctx.clearRect(0,0,W,H);
      const projected=AXES.map((ax,i)=>{
        const p=projectDir(ax.dir[0],ax.dir[1],ax.dir[2]);
        const depth=ax.dir[0]*Math.sin(cam.phi)*Math.cos(cam.theta)+
                    ax.dir[1]*Math.sin(cam.phi)*Math.sin(cam.theta)+
                    ax.dir[2]*Math.cos(cam.phi);
        return{ax,i,p,depth};
      }).sort((a,b)=>a.depth-b.depth);

      ctx.save();
      ctx.strokeStyle=_themeInk(.08);ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(CX,CY,Math.min(W,H)/2-1,0,Math.PI*2);ctx.stroke();
      ctx.restore();

      projected.forEach(({ax,i,p,depth})=>{
        const isFront=depth>=-0.01;
        const isHov=hovAxis===i;
        const alpha=isFront?(isHov?1:.85):(isHov?.55:.28);
        const col=ax.col;
        const dotR=DOT*(isFront?1:.7);

        ctx.save();
        ctx.strokeStyle=col;ctx.lineWidth=isFront?2:1.2;ctx.globalAlpha=alpha*0.7;
        ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(p.x,p.y);ctx.stroke();

        ctx.globalAlpha=alpha;
        ctx.fillStyle=isFront?(isHov?col:col):_themeInk(.2);
        ctx.beginPath();ctx.arc(p.x,p.y,dotR,0,Math.PI*2);ctx.fill();
        if(isFront&&isHov){
          ctx.strokeStyle=_themeHilight;ctx.lineWidth=1.2;ctx.globalAlpha=.7;
          ctx.beginPath();ctx.arc(p.x,p.y,dotR,0,Math.PI*2);ctx.stroke();
        }

        if(isFront){
          ctx.globalAlpha=isHov?1:.75;
          ctx.fillStyle=isHov?_themeHilight:col;
          ctx.font=(isHov?'600 ':'')+(dotR>6?'7px':'6px')+' DM Mono,monospace';
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText(ax.lbl,p.x,p.y+.5);
        }
        ctx.restore();
      });

      ctx.save();ctx.fillStyle=_themeInk(.25);
      ctx.beginPath();ctx.arc(CX,CY,2.5,0,Math.PI*2);ctx.fill();ctx.restore();
    }

    // ── getPos: map from visual CSS space → canvas logical space ──
    // Handles CSS zoom, transform:scale, and any CSS size ≠ logical size.
    function getPos(e){
      const r=nc.getBoundingClientRect();
      const src=e.touches&&e.touches.length>0?e.touches[0]:e.changedTouches&&e.changedTouches.length>0?e.changedTouches[0]:e;
      const rw=r.width||1, rh=r.height||1;
      return{x:(src.clientX-r.left)*(W/rw), y:(src.clientY-r.top)*(H/rh)};
    }

    var ncHoldTimer=null;

    // ── Named handler functions (removable) ──
    function onMouseDown(e){e.stopPropagation();const p=getPos(e);ncDrag={sx:p.x,sy:p.y,st:cam.theta,sp:cam.phi,moved:false};}
    function onMouseMove(e){
      const p=getPos(e);
      const h=ncDrag?-1:hitAxis(p.x,p.y);
      if(!ncDrag&&h!==hovAxis){hovAxis=h;draw();}
      if(!ncDrag)return;
      const dx=p.x-ncDrag.sx,dy=p.y-ncDrag.sy;
      if(Math.hypot(dx,dy)>4){ncDrag.moved=true;}
      if(ncDrag.moved){cam.theta=ncDrag.st+dx*.022;cam.phi=Math.max(.05,Math.min(Math.PI-.05,ncDrag.sp-dy*.022));updCam();draw();}
    }
    function onMouseUp(e){
      if(!ncDrag)return;
      if(!ncDrag.moved){const p=getPos(e);const h=hitAxis(p.x,p.y);if(h>-1)snapTo(h,false);}
      ncDrag=null;draw();
    }
    function onMouseLeave(){hovAxis=null;ncDrag=null;draw();}
    function onTouchStart(e){
      e.preventDefault();e.stopPropagation();
      const p=getPos(e);
      ncDrag={sx:p.x,sy:p.y,st:cam.theta,sp:cam.phi,moved:false,startT:Date.now()};
      if(ncHoldTimer)clearTimeout(ncHoldTimer);
      ncHoldTimer=setTimeout(function(){
        if(ncDrag&&!ncDrag.moved){
          const pp=getPos(e);const h=hitAxis(pp.x,pp.y);
          if(h>-1){snapTo(h,true);ncDrag.consumed=true;draw();}
        }
        ncHoldTimer=null;
      },400);
    }
    function onTouchMove(e){
      e.preventDefault();e.stopPropagation();
      if(!ncDrag)return;
      const p=getPos(e);const dx=p.x-ncDrag.sx,dy=p.y-ncDrag.sy;
      if(Math.hypot(dx,dy)>4){ncDrag.moved=true;if(ncHoldTimer){clearTimeout(ncHoldTimer);ncHoldTimer=null;}}
      if(ncDrag.moved){cam.theta=ncDrag.st+dx*.022;cam.phi=Math.max(.05,Math.min(Math.PI-.05,ncDrag.sp-dy*.022));updCam();draw();}
    }
    function onTouchEnd(e){
      e.stopPropagation();
      if(ncHoldTimer){clearTimeout(ncHoldTimer);ncHoldTimer=null;}
      if(ncDrag&&!ncDrag.moved&&!ncDrag.consumed){
        const p=getPos(e);const h=hitAxis(p.x,p.y);
        if(h>-1)snapTo(h,false);
      }
      ncDrag=null;draw();
    }

    nc.addEventListener('mousedown',onMouseDown);
    nc.addEventListener('mousemove',onMouseMove);
    nc.addEventListener('mouseup',onMouseUp);
    nc.addEventListener('mouseleave',onMouseLeave);
    nc.addEventListener('touchstart',onTouchStart,{passive:false});
    nc.addEventListener('touchmove',onTouchMove,{passive:false});
    nc.addEventListener('touchend',onTouchEnd);

    // ── Store cleanup function so next setupNavCube call can remove these ──
    nc._ncCleanup=function(){
      if(ncHoldTimer){clearTimeout(ncHoldTimer);ncHoldTimer=null;}
      nc.removeEventListener('mousedown',onMouseDown);
      nc.removeEventListener('mousemove',onMouseMove);
      nc.removeEventListener('mouseup',onMouseUp);
      nc.removeEventListener('mouseleave',onMouseLeave);
      nc.removeEventListener('touchstart',onTouchStart);
      nc.removeEventListener('touchmove',onTouchMove);
      nc.removeEventListener('touchend',onTouchEnd);
    };

    draw();return draw;
  }

  const nc=document.getElementById('navcube');window._ncDraw=setupNavCube(nc,nc.width,nc.height);
  const pnc=document.getElementById('pb-navcube');if(pnc)window._pbNcDraw=setupNavCube(pnc,pnc.width,pnc.height);
  window._pbNcReinit=function(){var c=document.getElementById('pb-navcube');if(c)window._pbNcDraw=setupNavCube(c,c.width,c.height);};
})();

// ================================================================
//  NAV JOYSTICK — pan joystick that swaps with NavCube in the nav slot
//
//  Behaviour:
//  - Touch/drag: knob follows finger, clamped to rim
//  - Single tap-release: one small pan step in the direction touched
//  - Hold: continuous pan while held, speed proportional to deflection
//  - Direction: always follows joystick push — right=cam-right, up=cam-up
//    Diagonal movement uses atan2 on the raw vector, no axis reversal
// ================================================================
(function(){
  let navShowJoy=false;

  // ── Reset view ───────────────────────────────────────────────────
  const CAM_DEFAULT={theta:-Math.PI/2,phi:Math.PI/2,radius:10};
  function resetView(){
    // If in FPS, exit without restoring saved cam (we want full reset)
    if(_fpsMode){
      _fpsMode=false;
      document.body.classList.remove('fps-active');
      _fpsSavedCam=null;
      _disposeFpsPlane();
      surfGroup.visible=true;
      navState=0;
      applyNavToggle();
    }
    cam.theta=CAM_DEFAULT.theta;cam.phi=CAM_DEFAULT.phi;cam.radius=CAM_DEFAULT.radius;
    cam.target.set(0,0,0);updCam();toast('View reset');
  }
  ['nav-reset','pb-nav-reset'].forEach(function(id){
    const b=document.getElementById(id);if(b)b.addEventListener('click',resetView);
  });

  // ── Zoom +/− buttons ─────────────────────────────────────────────
  // Tap = one step (~5%). Hold = continuous zoom via RAF.
  const ZOOM_STEP=0.05; // fraction of current radius per tap
  const ZOOM_HOLD_DELAY=180; // ms before continuous starts
  function applyZoom(dir){
    // dir: +1 = zoom in (reduce radius), -1 = zoom out (increase radius)
    if(useOrtho){
      orthoZoom=Math.max(1,Math.min(50,orthoZoom*(1-dir*ZOOM_STEP)));
      syncOrtho();
    } else {
      cam.radius=Math.max(1,Math.min(40,cam.radius*(1-dir*ZOOM_STEP)));
    }
    updCam();markDirty();
  }
  function setupZoomBtn(inId,outId){
    [
      {id:inId,dir:1},
      {id:outId,dir:-1}
    ].forEach(function(cfg){
      const b=document.getElementById(cfg.id);
      if(!b)return;
      let rafId=null,holdTimer=null;
      function startZoom(e){
        e.preventDefault();e.stopPropagation();
        applyZoom(cfg.dir);
        holdTimer=setTimeout(function(){
          function loop(){applyZoom(cfg.dir);rafId=requestAnimationFrame(loop);}
          rafId=requestAnimationFrame(loop);
        },ZOOM_HOLD_DELAY);
      }
      function stopZoom(){
        clearTimeout(holdTimer);holdTimer=null;
        if(rafId){cancelAnimationFrame(rafId);rafId=null;}
      }
      b.addEventListener('mousedown',startZoom);
      b.addEventListener('touchstart',startZoom,{passive:false});
      b.addEventListener('mouseup',stopZoom);
      b.addEventListener('mouseleave',stopZoom);
      b.addEventListener('touchend',stopZoom);
      b.addEventListener('touchcancel',stopZoom);
    });
  }
  setupZoomBtn('nav-zoom-in','nav-zoom-out');
  setupZoomBtn('pb-nav-zoom-in','pb-nav-zoom-out');


  const PAN_SPEED=0.00015;  // world units per pixel deflection per frame, ×radius (slowed v14.2)
  const JOY_DEADZONE=0.15;  // fraction of MAX_D that must be exceeded before panning starts

  function setupJoy(el){
    if(!el)return;
    if(el._joyCleanup)el._joyCleanup();
    const ctx=el.getContext('2d');
    const W=el.width,H=el.height,CX=W/2,CY=H/2;
    const PAD_R=Math.min(W,H)/2-4;
    const KNOB_R=Math.min(W,H)*0.14;
    const MAX_D=PAD_R-KNOB_R-2;
    const DEADZONE_PX=MAX_D*JOY_DEADZONE;
    let active=false,kx=0,ky=0,rafId=null;

    function draw(){
      ctx.clearRect(0,0,W,H);
      ctx.save();
      // Rim
      ctx.strokeStyle=_themeInk(.15);ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(CX,CY,PAD_R,0,Math.PI*2);ctx.stroke();
      // Deadzone ring — faint, so user can see where responsive zone begins
      ctx.strokeStyle=_themeInk(.10);ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(CX,CY,DEADZONE_PX,0,Math.PI*2);ctx.stroke();
      // Crosshair
      ctx.strokeStyle=_themeInk(.08);ctx.lineWidth=1;ctx.setLineDash([2,4]);
      ctx.beginPath();ctx.moveTo(CX,CY-PAD_R+5);ctx.lineTo(CX,CY+PAD_R-5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(CX-PAD_R+5,CY);ctx.lineTo(CX+PAD_R-5,CY);ctx.stroke();
      ctx.setLineDash([]);
      // Direction line when active
      if(active&&(kx!==0||ky!==0)){
        ctx.strokeStyle=_themeInk(.18);ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+kx,CY+ky);ctx.stroke();
      }
      // Knob
      ctx.fillStyle=active?_themeInk(.28):_themeInk(.12);
      ctx.strokeStyle=_themeInk(.25);ctx.lineWidth=1.2;
      ctx.beginPath();ctx.arc(CX+kx,CY+ky,KNOB_R,0,Math.PI*2);ctx.fill();ctx.stroke();
      // Idle hint arrows
      if(!active&&kx===0&&ky===0){
        ctx.strokeStyle=_themeInk(.12);ctx.lineWidth=1;ctx.lineCap='round';
        [[0,-1],[0,1],[-1,0],[1,0]].forEach(function(d){
          const r=PAD_R-8;
          ctx.beginPath();ctx.moveTo(CX+d[0]*(r-5),CY+d[1]*(r-5));ctx.lineTo(CX+d[0]*r,CY+d[1]*r);ctx.stroke();
        });
      }
      ctx.restore();
    }

    function applyPan(dx,dy){
      const dist=Math.sqrt(dx*dx+dy*dy);
      // Deadzone: if within inner ring, no pan
      if(dist<DEADZONE_PX)return;
      // Rescale: remap [DEADZONE_PX, MAX_D] to [0, MAX_D] so full-range stays reachable
      const effDist=(dist-DEADZONE_PX)*(MAX_D/(MAX_D-DEADZONE_PX));
      const s=effDist/dist; // scale factor on the (dx,dy) vector
      const edx=dx*s,edy=dy*s;
      const sinT=Math.sin(cam.theta),cosT=Math.cos(cam.theta);
      const sinP=Math.sin(cam.phi),cosP=Math.cos(cam.phi);
      const rx=-sinT,ry=cosT; // camera right
      const fz=cosP,fy=sinP*sinT,fx=sinP*cosT;
      const ux=ry*fz,uy=-rx*fz,uz=rx*fy-ry*fx; // camera up
      const sc=cam.radius*PAN_SPEED;
      cam.target.x+=(edx*rx+edy*ux)*sc;
      cam.target.y+=(edx*ry+edy*uy)*sc;
      cam.target.z+=(edy*uz)*sc;
      updCam();
    }

    function clamp(dx,dy){
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d>MAX_D)return{x:dx/d*MAX_D,y:dy/d*MAX_D};
      return{x:dx,y:dy};
    }

    function getPos(e){
      const r=el.getBoundingClientRect();
      const src=e.touches&&e.touches.length>0?e.touches[0]:e.changedTouches&&e.changedTouches.length>0?e.changedTouches[0]:e;
      var rw=r.width||1,rh=r.height||1;
      return{x:(src.clientX-r.left)*(W/rw),y:(src.clientY-r.top)*(H/rh)};
    }

    function onStart(e){
      e.preventDefault();e.stopPropagation();
      active=true;
      const p=getPos(e),c=clamp(p.x-CX,p.y-CY);
      kx=c.x;ky=c.y;
      // Immediate single step on touch-down
      applyPan(kx,ky);
      draw();
      if(rafId)cancelAnimationFrame(rafId);
      function loop(){
        if(!active)return;
        // Continue panning proportional to knob deflection
        if(kx!==0||ky!==0)applyPan(kx,ky);
        rafId=requestAnimationFrame(loop);
      }
      // Small delay before continuous — so a quick tap feels like one step
      setTimeout(function(){if(active)rafId=requestAnimationFrame(loop);},120);
    }
    function onMove(e){
      e.preventDefault();e.stopPropagation();
      if(!active)return;
      const p=getPos(e),c=clamp(p.x-CX,p.y-CY);
      kx=c.x;ky=c.y;draw();
    }
    function onEnd(e){
      e.stopPropagation();
      active=false;kx=0;ky=0;
      if(rafId){cancelAnimationFrame(rafId);rafId=null;}
      draw();
    }

    function onMouseMove(e){if(active)onMove(e);}

    el.addEventListener('mousedown',onStart);
    el.addEventListener('mousemove',onMouseMove);
    el.addEventListener('mouseup',onEnd);
    el.addEventListener('mouseleave',onEnd);
    el.addEventListener('touchstart',onStart,{passive:false});
    el.addEventListener('touchmove',onMove,{passive:false});
    el.addEventListener('touchend',onEnd);
    el.addEventListener('touchcancel',onEnd);

    el._joyCleanup=function(){
      el.removeEventListener('mousedown',onStart);
      el.removeEventListener('mousemove',onMouseMove);
      el.removeEventListener('mouseup',onEnd);
      el.removeEventListener('mouseleave',onEnd);
      el.removeEventListener('touchstart',onStart);
      el.removeEventListener('touchmove',onMove);
      el.removeEventListener('touchend',onEnd);
      el.removeEventListener('touchcancel',onEnd);
    };

    draw();
  }

  setupJoy(document.getElementById('navjoy'));
  setupJoy(document.getElementById('pb-navjoy'));
  window._pbJoyReinit=function(){setupJoy(document.getElementById('pb-navjoy'));};

  // ── Toggle NavCube ↔ Joystick ↔ FPS ──────────────────────────────
  // navState: 0=NavCube, 1=Joystick, 2=FPS
  var navState=0;
  var NAV_LABELS=['⬡ NAV','✥ JOY','👁 FPS'];

  function _createFpsPlane(){
    if(_fpsPlaneGroup)return;
    _fpsPlaneGroup=new THREE.Group();
    var sz=_fpsPlaneSz;
    // Fill mesh — same style as surfFillMat
    var fillMat=new THREE.MeshBasicMaterial({
      color:_activeSurfTrace(),transparent:true,opacity:0.16,
      side:THREE.DoubleSide,depthWrite:false
    });
    _fpsPlaneFill=new THREE.Mesh(new THREE.PlaneGeometry(sz,sz),fillMat);
    _fpsPlaneFill.renderOrder=7;
    _fpsPlaneGroup.add(_fpsPlaneFill);
    // Frosted depth-cue mesh
    var bgHex=scene.background?('#'+scene.background.getHexString()):'#cdb899';
    var froMat=new THREE.MeshBasicMaterial({
      color:new THREE.Color(bgHex),
      transparent:true,opacity:_depthOpSteps[_depthOpIdx],
      side:THREE.DoubleSide,depthWrite:false,depthTest:true
    });
    _fpsFrosted=new THREE.Mesh(new THREE.PlaneGeometry(sz,sz),froMat);
    _fpsFrosted.renderOrder=5;
    _fpsFrosted.visible=depthCuesOn;
    _fpsPlaneGroup.add(_fpsFrosted);
    // Grid mesh
    var gridMat=new THREE.MeshBasicMaterial({
      color:0xffffff,transparent:true,
      side:THREE.DoubleSide,depthWrite:false,depthTest:true
    });
    if(_surfGridMode>0){gridMat.map=buildSurfGridTex();gridMat.map.repeat.set(sz*2,sz*2);gridMat.map.needsUpdate=true;}
    _fpsFrostedGrid=new THREE.Mesh(new THREE.PlaneGeometry(sz,sz),gridMat);
    _fpsFrostedGrid.renderOrder=6;
    _fpsFrostedGrid.visible=depthCuesOn&&_surfGridMode>0;
    _fpsPlaneGroup.add(_fpsFrostedGrid);
    scene.add(_fpsPlaneGroup);
  }

  // Rebuild follow-plane geometries when size changes (avoids full dispose/recreate)
  function _rebuildFpsPlaneGeo(){
    if(!_fpsPlaneGroup)return;
    var sz=_fpsPlaneSz;
    var newGeo=new THREE.PlaneGeometry(sz,sz);
    [_fpsPlaneFill,_fpsFrosted,_fpsFrostedGrid].forEach(function(m){
      if(!m)return;
      if(m.geometry)m.geometry.dispose();
      m.geometry=newGeo.clone();
    });
    newGeo.dispose();
    // Rescale grid texture repeat
    if(_fpsFrostedGrid&&_fpsFrostedGrid.material.map){
      _fpsFrostedGrid.material.map.repeat.set(sz*2,sz*2);
      _fpsFrostedGrid.material.map.needsUpdate=true;
    }
    markDirty();
  }

  function _disposeFpsPlane(){
    if(!_fpsPlaneGroup)return;
    scene.remove(_fpsPlaneGroup);
    _fpsPlaneGroup.children.slice().forEach(function(m){
      if(m.geometry)m.geometry.dispose();
      if(m.material){if(m.material.map)m.material.map.dispose();m.material.dispose();}
    });
    _fpsPlaneGroup=null;_fpsPlaneFill=null;_fpsFrosted=null;_fpsFrostedGrid=null;
  }

  // Apply _fpsSurfMode: 0=NONE 1=FOLLOW 2=SCENE
  function _applyFpsSurfMode(){
    // surfGroup visibility
    surfGroup.visible=(_fpsSurfMode===2);
    // follow-plane group visibility
    if(_fpsPlaneGroup)_fpsPlaneGroup.visible=(_fpsSurfMode===1);
    markDirty();
    // sync button label
    var btn=document.getElementById('fps-plane-toggle');
    var labels=['○ NONE','✦ FOLLOW','⬡ SCENE'];
    if(btn){
      btn.textContent=labels[_fpsSurfMode];
      btn.classList.toggle('on',_fpsSurfMode>0);
    }
    // dist slider: only relevant in FOLLOW mode
    var distWrap=document.getElementById('fps-plane-dist-wrap');
    if(distWrap)distWrap.style.display=(_fpsSurfMode===1)?'flex':'none';
  }
  window._applyFpsSurfMode=_applyFpsSurfMode;

  // Called when depth cues toggle changes — update follow-plane frosted meshes
  window._syncFpsDepth=function(){
    if(!_fpsPlaneGroup)return;
    if(_fpsFrosted)_fpsFrosted.visible=depthCuesOn;
    if(_fpsFrostedGrid)_fpsFrostedGrid.visible=depthCuesOn&&_surfGridMode>0;
    markDirty();
  };

  function enterFps(){
    if(_fpsMode)return;
    // Save radius only for restore reference; we won't snap camera back
    _fpsSavedCam={radius:cam.radius};
    // Compute orbit eye position → set as FPS eye
    var sinP=Math.sin(cam.phi),cosP=Math.cos(cam.phi);
    var sinT=Math.sin(cam.theta),cosT=Math.cos(cam.theta);
    var eyeX=cam.target.x+cam.radius*sinP*cosT;
    var eyeY=cam.target.y+cam.radius*sinP*sinT;
    var eyeZ=cam.target.z+cam.radius*cosP;
    cam.target.set(eyeX,eyeY,eyeZ);
    // Flip look direction: was orbit eye→target, now look toward original target
    cam.theta=cam.theta+Math.PI;
    cam.phi=Math.PI-cam.phi;
    cam.phi=Math.max(0.05,Math.min(Math.PI-0.05,cam.phi));
    _fpsMode=true;
    document.body.classList.add('fps-active');
    _createFpsPlane();
    _fpsSurfMode=2; // default: SCENE
    _applyFpsSurfMode();
    updCam();
    // Re-sync card gizmo visibility — _syncButtons hides it when LCL is on,
    // but in FPS mode we keep it visible for plane positioning
    if(window._syncLclButtons)window._syncLclButtons();
    // Resize control card canvases so look panel gets properly sized
    setTimeout(function(){if(window._fcResizeCanvases)window._fcResizeCanvases();},30);
    toast('FPS mode · left:move · right:look');
  }

  function exitFps(){
    if(!_fpsMode)return;
    // Compute orbit state from current FPS eye+direction (item 1: no view snap)
    var sinP=Math.sin(cam.phi),cosP=Math.cos(cam.phi);
    var sinT=Math.sin(cam.theta),cosT=Math.cos(cam.theta);
    var radius=(_fpsSavedCam&&_fpsSavedCam.radius)||cam.radius||10;
    // Orbit target = eye + forward * radius  (place target in front of eye)
    var fx=sinP*cosT,fy=sinP*sinT,fz=cosP;
    cam.target.set(
      cam.target.x+fx*radius,
      cam.target.y+fy*radius,
      cam.target.z+fz*radius
    );
    // Orbit theta/phi = opposite of FPS (orbit camera is behind the target)
    cam.theta=cam.theta-Math.PI;
    cam.phi=Math.PI-cam.phi;
    cam.phi=Math.max(0.05,Math.min(Math.PI-0.05,cam.phi));
    cam.radius=radius;
    _fpsMode=false;
    _fpsSavedCam=null;
    document.body.classList.remove('fps-active');
    _disposeFpsPlane();
    surfGroup.visible=true; // always restore surface visibility
    updCam();
    // Re-sync card gizmo visibility — LCL may still be on, re-apply hide
    if(window._syncLclButtons)window._syncLclButtons();
    // Resize control card canvases — look panel hidden, nav/gizmo reclaim space
    setTimeout(function(){if(window._fcResizeCanvases)window._fcResizeCanvases();},30);
    toast('Orbit mode');
  }
  window._exitFps=exitFps;
  window._enterFps=enterFps;

  // FPS follow-plane UI wiring
  (function(){
    var toggleBtn=document.getElementById('fps-plane-toggle');
    var distSlider=document.getElementById('fps-plane-dist');
    var sizeSlider=document.getElementById('fps-plane-size');
    if(toggleBtn){
      toggleBtn.addEventListener('click',function(){
        if(!_fpsMode)return;
        // Cycle: SCENE(2) → FOLLOW(1) → NONE(0) → SCENE(2)
        _fpsSurfMode=_fpsSurfMode===2?1:_fpsSurfMode===1?0:2;
        _applyFpsSurfMode();
      });
    }
    if(distSlider){
      distSlider.value=_fpsPlaneDist;
      distSlider.addEventListener('input',function(){
        _fpsPlaneDist=parseFloat(distSlider.value);
        updCam();
      });
    }
    if(sizeSlider){
      sizeSlider.value=_fpsPlaneSz;
      sizeSlider.addEventListener('input',function(){
        _fpsPlaneSz=parseFloat(sizeSlider.value);
        _rebuildFpsPlaneGeo();
      });
    }
  })();

  function applyNavToggle(){
    navShowJoy=(navState===1);
    var isFps=(navState===2);
    var ids=[
      {nc:'navcube',jy:'navjoy',fc:'fps-move-card',btn:'nav-toggle'},
      {nc:'pb-navcube',jy:'pb-navjoy',fc:'pb-fps-move-card',btn:'pb-nav-toggle'}
    ];
    ids.forEach(function(g){
      var nc=document.getElementById(g.nc);
      var jy=document.getElementById(g.jy);
      var fc=document.getElementById(g.fc);
      var btn=document.getElementById(g.btn);
      if(nc)nc.style.display=(navState===0)?'block':'none';
      if(jy)jy.style.display=(navState===1)?'block':'none';
      if(fc)fc.style.display=(navState===2)?'flex':'none';
      if(btn){btn.textContent=NAV_LABELS[navState];btn.classList.toggle('on',navState>0);}
    });
    if(navState===0){if(window._ncDraw)window._ncDraw();if(window._pbNcDraw)window._pbNcDraw();}
    if(isFps) enterFps();
    else exitFps();
  }

  function toggleNav(){navState=(navState+1)%3;applyNavToggle();}
  window._applyNavToggle=applyNavToggle;
  window._resetNavState=function(){navState=0;applyNavToggle();};
  var t1=document.getElementById('nav-toggle');if(t1)t1.addEventListener('click',toggleNav);
  var t2=document.getElementById('pb-nav-toggle');if(t2)t2.addEventListener('click',toggleNav);

  // FPS exit button
  var fpsExitBtn=document.getElementById('fps-exit');
  if(fpsExitBtn)fpsExitBtn.addEventListener('click',function(){navState=0;applyNavToggle();});

  applyNavToggle();
})();

// ================================================================
//  FPS NAV CONTROLS — dual joysticks, vertical buttons, canvas drag,
//  keyboard WASD/arrows, scroll wheel vertical
//
//  Activated when navState===2 (FPS toggle). All UI is inside
//  #fps-overlay and only receives events when body.fps-active.
//  Drawing still works: 1-finger on canvas = draw (when not on FPS UI).
//  In STYLUS mode, pen draws, 1-finger = FPS look drag on canvas.
// ================================================================
(function(){
  // ── Constants ──
  var FPS_MOVE_SPEED=0.012;
  var FPS_MOVE_BOOST=0.028;
  var FPS_VT_SPEED=0.015;
  var FPS_ORBIT_SENS=0.004;
  var FPS_LOOK_JOY_RATE=0.015;
  var FPS_JOY_DEADZONE=0.15;
  var FPS_KB_LOOK_RATE=0.015;

  // ── Joystick Factory (adapted from prototype) ──
  function createFpsJoystick(wrapId,onTick,opts){
    opts=opts||{};
    var wrap=document.getElementById(wrapId);
    if(!wrap)return null;
    var el=wrap.querySelector('canvas');
    if(!el)return null;
    var ctx=el.getContext('2d');
    var W=el.width,H=el.height,CX=W/2,CY=H/2;
    var PAD_R=Math.min(W,H)/2-8;
    var KNOB_R=Math.min(W,H)*0.14;
    var MAX_D=PAD_R-KNOB_R-2;
    var DEADZONE_PX=MAX_D*FPS_JOY_DEADZONE;
    var active=false,kx=0,ky=0,rafId=null;
    var touchId=null;
    var labels=opts.labels||null;

    function draw(){
      ctx.clearRect(0,0,W,H);
      ctx.save();
      ctx.strokeStyle=_themeInk(.12);ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(CX,CY,PAD_R,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle=_themeInk(.06);ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(CX,CY,DEADZONE_PX,0,Math.PI*2);ctx.stroke();
      ctx.strokeStyle=_themeInk(.05);ctx.lineWidth=1;ctx.setLineDash([3,5]);
      ctx.beginPath();ctx.moveTo(CX,CY-PAD_R+8);ctx.lineTo(CX,CY+PAD_R-8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(CX-PAD_R+8,CY);ctx.lineTo(CX+PAD_R-8,CY);ctx.stroke();
      ctx.setLineDash([]);
      if(active&&(kx!==0||ky!==0)){
        ctx.strokeStyle=_themeInk(.15);ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+kx,CY+ky);ctx.stroke();
      }
      ctx.fillStyle=active?_themeInk(.22):_themeInk(.07);
      ctx.strokeStyle=_themeInk(.18);ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(CX+kx,CY+ky,KNOB_R,0,Math.PI*2);ctx.fill();ctx.stroke();
      if(!active&&kx===0&&ky===0){
        if(labels){
          ctx.fillStyle=_themeInk(.12);
          ctx.font='600 14px DM Mono, monospace';
          ctx.textAlign='center';ctx.textBaseline='middle';
          var lr=PAD_R-16;
          ctx.fillText(labels[0],CX,CY-lr);
          ctx.fillText(labels[2],CX,CY+lr);
          ctx.fillText(labels[1],CX-lr,CY);
          ctx.fillText(labels[3],CX+lr,CY);
        } else {
          ctx.strokeStyle=_themeInk(.1);ctx.lineWidth=1.5;ctx.lineCap='round';
          [[0,-1],[0,1],[-1,0],[1,0]].forEach(function(d){
            var rr=PAD_R-10;
            ctx.beginPath();ctx.moveTo(CX+d[0]*(rr-6),CY+d[1]*(rr-6));ctx.lineTo(CX+d[0]*rr,CY+d[1]*rr);ctx.stroke();
          });
        }
      }
      ctx.restore();
    }

    function getNorm(){
      var dist=Math.sqrt(kx*kx+ky*ky);
      if(dist<DEADZONE_PX)return{nx:0,ny:0,norm:0};
      var effDist=(dist-DEADZONE_PX)*(MAX_D/(MAX_D-DEADZONE_PX));
      var s=effDist/dist;
      return{nx:(kx*s)/MAX_D,ny:(ky*s)/MAX_D,norm:effDist/MAX_D};
    }

    function clamp(dx,dy){
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d>MAX_D)return{x:dx/d*MAX_D,y:dy/d*MAX_D};
      return{x:dx,y:dy};
    }

    function getPos(e){
      var r=el.getBoundingClientRect();
      var src=null;
      if(e.touches){
        if(touchId!==null){
          for(var i=0;i<e.touches.length;i++){
            if(e.touches[i].identifier===touchId){src=e.touches[i];break;}
          }
        }
        if(!src&&e.touches.length>0)src=e.touches[0];
        if(!src&&e.changedTouches&&e.changedTouches.length>0)src=e.changedTouches[0];
      }
      if(!src)src=e;
      var rw=r.width||1,rh=r.height||1;
      return{x:(src.clientX-r.left)*(W/rw),y:(src.clientY-r.top)*(H/rh)};
    }

    function startLoop(){
      if(rafId)return;
      function loop(){
        if(!active){rafId=null;return;}
        var n=getNorm();
        if(n.norm>0)onTick(n.nx,n.ny,n.norm);
        rafId=requestAnimationFrame(loop);
      }
      rafId=requestAnimationFrame(loop);
    }

    function onStart(e){
      e.preventDefault();e.stopPropagation();
      if(active)return;
      if(e.touches){
        var t=e.changedTouches?e.changedTouches[0]:e.touches[0];
        touchId=t.identifier;
      }
      active=true;
      var p=getPos(e),c=clamp(p.x-CX,p.y-CY);
      kx=c.x;ky=c.y;
      var n=getNorm();
      if(n.norm>0)onTick(n.nx,n.ny,n.norm);
      draw();
      setTimeout(function(){if(active)startLoop();},100);
    }
    function onMoveTouch(e){
      e.preventDefault();e.stopPropagation();
      if(!active)return;
      if(touchId!==null&&e.touches){
        var found=false;
        for(var i=0;i<e.touches.length;i++){
          if(e.touches[i].identifier===touchId){found=true;break;}
        }
        if(!found)return;
      }
      var p=getPos(e),c=clamp(p.x-CX,p.y-CY);
      kx=c.x;ky=c.y;draw();
    }
    function onEnd(e){
      if(!active)return;
      if(touchId!==null&&e.touches){
        for(var i=0;i<e.touches.length;i++){
          if(e.touches[i].identifier===touchId)return;
        }
      }
      e.stopPropagation();
      active=false;kx=0;ky=0;touchId=null;
      if(rafId){cancelAnimationFrame(rafId);rafId=null;}
      draw();
    }

    var mouseActive=false;
    function onMouseDown(e){
      e.preventDefault();e.stopPropagation();
      mouseActive=true;active=true;
      var p=getPos(e),c=clamp(p.x-CX,p.y-CY);
      kx=c.x;ky=c.y;
      var n=getNorm();
      if(n.norm>0)onTick(n.nx,n.ny,n.norm);
      draw();
      setTimeout(function(){if(active)startLoop();},100);
    }
    function onMouseMove(e){if(!mouseActive)return;var p=getPos(e),c=clamp(p.x-CX,p.y-CY);kx=c.x;ky=c.y;draw();}
    function onMouseUp(){if(!mouseActive)return;mouseActive=false;active=false;kx=0;ky=0;if(rafId){cancelAnimationFrame(rafId);rafId=null;}draw();}

    el.addEventListener('touchstart',onStart,{passive:false});
    el.addEventListener('touchmove',onMoveTouch,{passive:false});
    el.addEventListener('touchend',onEnd);
    el.addEventListener('touchcancel',onEnd);
    el.addEventListener('mousedown',onMouseDown);
    el.addEventListener('mousemove',onMouseMove);
    el.addEventListener('mouseup',onMouseUp);
    el.addEventListener('mouseleave',onMouseUp);

    draw();
    return{redraw:draw};
  }

  // ── Movement Joystick (left) — FPS ground movement, inside nav card ──
  function fpsMoveTick(nx,ny,norm){
    if(!_fpsMode)return;
    var sinT=Math.sin(cam.theta),cosT=Math.cos(cam.theta);
    var sinP=Math.sin(cam.phi);
    // Ground-projected forward (XY plane, Z-up)
    var fx=sinP*cosT,fy=sinP*sinT;
    var gfLen=Math.sqrt(fx*fx+fy*fy);
    var gfx,gfy;
    if(gfLen<0.001){gfx=cosT;gfy=sinT;}
    else{gfx=fx/gfLen;gfy=fy/gfLen;}
    // Ground right: perpendicular on XY plane
    var grx=gfy,gry=-gfx;
    // Acceleration curve
    var curved=norm*norm;
    var speed=FPS_MOVE_SPEED+curved*FPS_MOVE_BOOST;
    // stick up (ny<0) → forward, stick right (nx>0) → strafe right
    cam.target.x+=(-ny*gfx+nx*grx)*speed;
    cam.target.y+=(-ny*gfy+nx*gry)*speed;
    updCam();
  }
  createFpsJoystick('fps-move-card',fpsMoveTick,{labels:null});
  createFpsJoystick('pb-fps-move-card',fpsMoveTick,{labels:null});

  // ── Look Joystick (right) — FPS look rotation ──
  var _fpsLookTick=function(nx,ny,norm){
    if(!_fpsMode)return;
    cam.theta-=nx*FPS_LOOK_JOY_RATE;
    cam.phi=Math.max(0.05,Math.min(Math.PI-0.05,cam.phi+ny*FPS_LOOK_JOY_RATE));
    updCam();
  };
  createFpsJoystick('fps-joy-look',_fpsLookTick,{labels:['\u2191','\u2190','\u2193','\u2192']});
  createFpsJoystick('pb-fps-joy-look',_fpsLookTick,{labels:['\u2191','\u2190','\u2193','\u2192']});

  // ── Vertical buttons — hold to move up/down ──
  function wireFpsVtBtn(id,dir){
    var btn=document.getElementById(id);
    if(!btn)return;
    var rafId2=null,holdTimer=null,held=false;
    function step(){
      if(!_fpsMode)return;
      cam.target.z+=dir*FPS_VT_SPEED;
      updCam();
      rafId2=requestAnimationFrame(step);
    }
    function onDown(e){
      e.preventDefault();e.stopPropagation();
      if(!_fpsMode)return;
      held=true;btn.classList.add('held');
      cam.target.z+=dir*FPS_VT_SPEED;
      updCam();
      holdTimer=setTimeout(function(){
        if(held)rafId2=requestAnimationFrame(step);
      },150);
    }
    function onUp(e){
      if(e)e.stopPropagation();
      held=false;btn.classList.remove('held');
      clearTimeout(holdTimer);holdTimer=null;
      if(rafId2){cancelAnimationFrame(rafId2);rafId2=null;}
    }
    btn.addEventListener('mousedown',onDown);
    btn.addEventListener('mouseup',onUp);
    btn.addEventListener('mouseleave',onUp);
    btn.addEventListener('touchstart',onDown,{passive:false});
    btn.addEventListener('touchend',onUp);
    btn.addEventListener('touchcancel',onUp);
  }
  wireFpsVtBtn('fps-vt-up',1);
  wireFpsVtBtn('fps-vt-down',-1);
  wireFpsVtBtn('pb-fps-vt-up',1);
  wireFpsVtBtn('pb-fps-vt-down',-1);
  wireFpsVtBtn('fps-look-vt-up',1);
  wireFpsVtBtn('fps-look-vt-down',-1);
  wireFpsVtBtn('pb-fps-look-vt-up',1);
  wireFpsVtBtn('pb-fps-look-vt-down',-1);

  // ── Canvas look-drag ──
  // FPS look on desktop: right-click orbit (doOrbit has FPS branch), keyboard arrows,
  // or right joystick. Left-click stays free for drawing.
  // On mobile: STYLUS mode 1-finger = orbit (which becomes FPS look via doOrbit FPS branch).
  // Non-STYLUS mode: 1-finger = draw, look via right joystick only.

  function _fpsIsOnUI(x,y){
    var els=[document.getElementById('fps-joy-look'),document.getElementById('fps-plane-ctrl'),document.getElementById('pb-panel-look')];
    for(var i=0;i<els.length;i++){
      if(!els[i])continue;
      var r=els[i].getBoundingClientRect();
      var pad=10;
      if(x>=r.left-pad&&x<=r.right+pad&&y>=r.top-pad&&y<=r.bottom+pad)return true;
    }
    return false;
  }

  // Scroll wheel = vertical movement in FPS (handled in main wheel handler via _fpsMode check)

  // ── Keyboard — WASD move, Arrow look, Q/E vertical ──
  var _fpsKeys={};
  window.addEventListener('keydown',function(e){
    if(!_fpsMode)return;
    if(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA')return;
    _fpsKeys[e.key.toLowerCase()]=true;
    if(e.code)_fpsKeys[e.code]=true;
  });
  window.addEventListener('keyup',function(e){
    _fpsKeys[e.key.toLowerCase()]=false;
    if(e.code)_fpsKeys[e.code]=false;
  });

  // FPS keyboard tick — runs every frame
  function fpsTick(){
    requestAnimationFrame(fpsTick);
    if(!_fpsMode)return;
    var moved=false;
    // Movement (WASD)
    var fwd=0,strafe=0;
    if(_fpsKeys['w'])fwd+=1;
    if(_fpsKeys['s'])fwd-=1;
    if(_fpsKeys['d'])strafe+=1;
    if(_fpsKeys['a'])strafe-=1;

    if(fwd!==0||strafe!==0){
      var sinT=Math.sin(cam.theta),cosT=Math.cos(cam.theta);
      var sinP=Math.sin(cam.phi);
      var fx=sinP*cosT,fy=sinP*sinT;
      var gfLen=Math.sqrt(fx*fx+fy*fy);
      var gfx,gfy;
      if(gfLen<0.001){gfx=cosT;gfy=sinT;}
      else{gfx=fx/gfLen;gfy=fy/gfLen;}
      var grx=gfy,gry=-gfx;
      var len=Math.sqrt(fwd*fwd+strafe*strafe);
      var nfwd=fwd/len,nstrafe=strafe/len;
      cam.target.x+=(nfwd*gfx+nstrafe*grx)*FPS_MOVE_SPEED;
      cam.target.y+=(nfwd*gfy+nstrafe*gry)*FPS_MOVE_SPEED;
      moved=true;
    }
    // Vertical (Q up, E down)
    if(_fpsKeys['q']){cam.target.z+=FPS_MOVE_SPEED*0.5;moved=true;}
    if(_fpsKeys['e']){cam.target.z-=FPS_MOVE_SPEED*0.5;moved=true;}
    // Look (arrows)
    if(_fpsKeys['arrowleft']){cam.theta+=FPS_KB_LOOK_RATE;moved=true;}
    if(_fpsKeys['arrowright']){cam.theta-=FPS_KB_LOOK_RATE;moved=true;}
    if(_fpsKeys['arrowup']){cam.phi=Math.max(0.05,cam.phi-FPS_KB_LOOK_RATE);moved=true;}
    if(_fpsKeys['arrowdown']){cam.phi=Math.min(Math.PI-0.05,cam.phi+FPS_KB_LOOK_RATE);moved=true;}

    if(moved)updCam();
  }
  fpsTick();

})();

(function(){
  var LONG_MS=450;
  function _syncEraseVisual(){
    var ids=['serase','pb-erase','scx-erase'];
    for(var i=0;i<ids.length;i++){
      var b=document.getElementById(ids[i]);
      if(b)b.classList.toggle('partial-erase',_partialErase);
    }
  }
  function wireEraseLongPress(id){
    var btn=document.getElementById(id);if(!btn)return;
    var _lpTimer=null,_didLong=false;
    function onStart(e){
      _didLong=false;
      _lpTimer=setTimeout(function(){
        _didLong=true;
        _partialErase=!_partialErase;
        _syncEraseVisual();
        toast(_partialErase?'Partial erase':'Line erase');
        if(mode!=='erase')setMode('erase');
      },LONG_MS);
    }
    function onEnd(e){
      clearTimeout(_lpTimer);
      if(!_didLong){setMode('erase');}
    }
    function onCancel(){clearTimeout(_lpTimer);_didLong=false;}
    btn.addEventListener('pointerdown',onStart);
    btn.addEventListener('pointerup',onEnd);
    btn.addEventListener('pointercancel',onCancel);
    btn.addEventListener('pointerleave',onCancel);
    // Suppress click so it doesn't fire after pointerup
    btn.addEventListener('click',function(e){e.stopImmediatePropagation();e.preventDefault();});
  }
  wireEraseLongPress('serase');
  wireEraseLongPress('pb-erase');
  wireEraseLongPress('scx-erase');
  window._syncEraseVisual=_syncEraseVisual;
})();

function togglePersp(){
  setOrtho(!useOrtho);
}
var _orthoLerp=null;
function setOrtho(on){
  if(on===useOrtho){return;}
  // Cancel any in-progress ortho lerp
  if(_orthoLerp){cancelAnimationFrame(_orthoLerp);_orthoLerp=null;}
  var CAM_FOV_HALF_TAN=Math.tan(27.5*Math.PI/180);
  var dur=400;
  var startT=performance.now();
  if(on){
    // Persp → Ortho: flip immediately, lerp zoom from perspective-matching to target
    useOrtho=true;
    var startZoom=cam.radius*CAM_FOV_HALF_TAN;
    var endZoom=orthoZoom; // current orthoZoom is the target (last saved value)
    orthoZoom=startZoom;
    syncOrtho();
    function stepToOrtho(){
      var t=Math.min(1,(performance.now()-startT)/dur);
      var e=t<1?t*(2-t):1;
      orthoZoom=startZoom+(endZoom-startZoom)*e;
      syncOrtho();updCam();markDirty();
      if(t<1){_orthoLerp=requestAnimationFrame(stepToOrtho);}
      else{_orthoLerp=null;orthoZoom=endZoom;syncOrtho();updCam();}
    }
    _orthoLerp=requestAnimationFrame(stepToOrtho);
  } else {
    // Ortho → Persp: keep ortho, lerp zoom toward persp-matching, flip at end
    var startZoom2=orthoZoom;
    var endZoom2=cam.radius*CAM_FOV_HALF_TAN;
    function stepToPersp(){
      var t=Math.min(1,(performance.now()-startT)/dur);
      var e=t<1?t*(2-t):1;
      orthoZoom=startZoom2+(endZoom2-startZoom2)*e;
      syncOrtho();updCam();markDirty();
      if(t<1){_orthoLerp=requestAnimationFrame(stepToPersp);}
      else{_orthoLerp=null;useOrtho=false;syncOrtho();updCam();}
    }
    _orthoLerp=requestAnimationFrame(stepToPersp);
  }
  var txt=on?'ORTHO':'PERSP';
  ['bpersp','nav-persp','pb-nav-persp'].forEach(function(id){
    var b=document.getElementById(id);
    if(b){b.textContent=txt;b.classList.toggle('on',on);}
  });
}

    document.body.classList.remove('pages-open','views-open');
    document.getElementById('pgbtn').classList.remove('on');
    document.getElementById('vwbtn').classList.remove('on');
    var pbp=document.getElementById('pb-pgbtn');if(pbp)pbp.classList.remove('on');
    var pbv=document.getElementById('pb-vwbtn');if(pbv)pbv.classList.remove('on');
  }
  // Float card: show/hide based on UI state and layout mode
  var _vvp2=window.visualViewport;
  var isNarrow=(_vvp2?_vvp2.width:window.innerWidth)/(_vvp2?_vvp2.height:window.innerHeight)<(2/3);
  var card=document.getElementById('pb-float-card');
  var fab=document.getElementById('pb-fab');
  if(hidden){
    // UI turning off: show float card in both narrow and tablet mode
    // Undock if currently docked (card must be floating when UI is off)
    if(card&&card.classList.contains('fc-docked-bottom')){
      card.classList.remove('fc-docked-bottom');
      card.style.left=(window._fcLastLeft||8)+'px';
      card.style.top=(window._fcLastTop||52)+'px';
      card.style.width=(window._fcLastW||Math.min(window.innerWidth-16,340))+'px';
      card.style.right='';card.style.bottom='';
      var db=document.getElementById('fc-dock-btn');
      if(db)db.textContent='⊞';
    }
    // In tablet mode: reparent panels into float card now
    // …unless the user has already detached sc-groups — those serve the role
    // of the float card and showing both would duplicate UI.
    if(!isNarrow&&!_scState.detached){
      _fcReparent();
      if(!window._fcEverActivated){window._fcEverActivated=true;}
    }
    if(!window._cardHidden&&!(_scState.detached&&!isNarrow)){
      if(card)card.classList.add('fc-visible');
      if(fab)fab.classList.remove('fab-visible');
    }
    // If wide + ui-hidden + detached: show detached cards (they're already visible
    // unless user hid them) and FAB if they were hidden.
    if(!isNarrow&&_scState.detached){
      applySidecol();
      _updateScFab();
    }
    setTimeout(_fcResizeCanvases,50);
  } else {
    // UI turning on: in tablet mode, hide float card and return panels to sidebar
    if(!isNarrow){
      if(card)card.classList.remove('fc-visible');
      if(fab)fab.classList.remove('fab-visible');
      window._cardHidden=false;
      _fcReturn();
    }
    // In narrow mode, card visibility is already managed by updateLayoutMode/narrow state
  }
  // Sync LCL float position to new ui-hidden state.
  // Docked path never called applySidecol(), so LCL would stay at its old
  // sg-bottom position and overlap the ≡ toggle. Call immediately on hide;
  // defer on show so sidecol layout is restored before measuring sg-bottom.
  if(hidden){positionLclFloat();}else{setTimeout(positionLclFloat,0);}
});

var BG_PRESETS={beige:'#cdb899',white:'#ffffff',black:'#2a2a2e'};
var _curBgKey='beige';
function setBgColor(hex,key){
  var c=new THREE.Color(hex);
  scene.background=c;
  scene.fog.color=c;
  renderer.setClearColor(c,1);
  BG_COL.set(hex);
  if(_frostedMat)_frostedMat.color.set(hex);
  if(_fpsFrosted&&_fpsFrosted.material)_fpsFrosted.material.color.set(hex);
  document.documentElement.style.setProperty('--bg',hex);
  markDirty();
  // Sync swatch active state — both bgpop and view-pop
  _curBgKey=key||'custom';
  document.querySelectorAll('.bgpop-swatch').forEach(function(sw){sw.classList.remove('on');});
  var pick=document.getElementById('bgpop-pick');if(pick)pick.classList.remove('on');
  var vpPick=document.getElementById('vp-bgpick');if(vpPick)vpPick.classList.remove('on');
  if(key){
    var sw=document.getElementById('bgpop-'+key);if(sw)sw.classList.add('on');
    var vp=document.getElementById('vp-bg-'+key);if(vp)vp.classList.add('on');
  } else {
    if(pick)pick.classList.add('on');
    if(vpPick)vpPick.classList.add('on');
  }
  // Auto-select UI theme based on BG luminance (skip if user chose eink)
  if(_uiTheme!=='eink'){
    var lum=0.299*c.r+0.587*c.g+0.114*c.b;
    if(lum<0.25) setUITheme('dark');
    else if(lum>0.82) setUITheme('light');
    else setUITheme('default');
    // Adapt grid/plane colors to match bg hue
    _syncGridToBg(c);
  }
  // Sync theme selector if exists
  _syncThemeBtns();
}

// ── View toggle (tap=all on/off, long-press=popover) ─────────────
(function(){
  var btn=document.getElementById('bview-toggle');
  var arrow=document.getElementById('bview-arrow');
  var pop=document.getElementById('view-pop');
  if(!btn||!pop)return;
  // Track individual saved states for restore
  var _viewSaved={surf:true,grid:true,axis:true,depth:true};
  var _viewAllOn=true;

  function syncToggleIcon(){
    var anyOn=surfGroup.visible||gridH.visible||axisLinesOn||depthCuesOn;
    btn.classList.toggle('on',anyOn);
  }

  function openPop(){
    // Sync .on states with current visibility
    document.getElementById('bsurf').classList.toggle('on',surfGroup.visible);
    document.getElementById('bgrid').classList.toggle('on',gridH.visible);
    document.getElementById('baxis').classList.toggle('on',axisLinesOn);
    document.getElementById('bdepth').classList.toggle('on',depthCuesOn);
    pop.classList.add('open');
    var br=(arrow||btn).getBoundingClientRect();
    pop.style.top=(br.bottom+4)+'px';
    pop.style.left=Math.max(4,Math.min(br.left,window.innerWidth-pop.offsetWidth-4))+'px';
    if(arrow)arrow.classList.add('on');
  }
  function closePop(){pop.classList.remove('open');if(arrow)arrow.classList.remove('on');}

  // Tap eye: toggle all 4 on/off
  function tapToggle(){
    var anyOn=surfGroup.visible||gridH.visible||axisLinesOn||depthCuesOn;
    if(anyOn){
      // Save current states, then turn all off
      _viewSaved.surf=surfGroup.visible;
      _viewSaved.grid=gridH.visible;
      _viewSaved.axis=axisLinesOn;
      _viewSaved.depth=depthCuesOn;
      _viewAllOn=false;
      surfGroup.visible=false;gridH.visible=false;
      axisLinesOn=false;axisGroup.visible=false;
      depthCuesOn=false;
      if(_frostedMesh)_frostedMesh.visible=false;
      if(_frostedGridMesh)_frostedGridMesh.visible=false;
      if(window._syncFpsDepth)window._syncFpsDepth();
    } else {
      // Restore saved states
      surfGroup.visible=_viewSaved.surf;
      gridH.visible=_viewSaved.grid;
      axisLinesOn=_viewSaved.axis;axisGroup.visible=_viewSaved.axis;
      depthCuesOn=_viewSaved.depth;
      if(_frostedMesh)_frostedMesh.visible=depthCuesOn;
      if(_frostedGridMesh)_frostedGridMesh.visible=depthCuesOn&&_surfGridMode>0;
      if(window._syncFpsDepth)window._syncFpsDepth();
      _viewAllOn=true;
    }
    // Sync all buttons
    document.getElementById('bsurf').classList.toggle('on',surfGroup.visible);
    document.getElementById('bgrid').classList.toggle('on',gridH.visible);
    document.getElementById('baxis').classList.toggle('on',axisLinesOn);
    document.getElementById('bdepth').classList.toggle('on',depthCuesOn);
    var pb;
    pb=document.getElementById('pb-surf');if(pb)pb.classList.toggle('on',surfGroup.visible);
    pb=document.getElementById('pb-grid');if(pb)pb.classList.toggle('on',gridH.visible);
    pb=document.getElementById('pb-axis');if(pb)pb.classList.toggle('on',axisLinesOn);
    pb=document.getElementById('pb-depth');if(pb)pb.classList.toggle('on',depthCuesOn);
    syncToggleIcon();
    markDirty();
    toast(anyOn?'View off':'View on');
  }

  // Eye icon tap = toggle all
  btn.addEventListener('click',function(e){e.stopPropagation();tapToggle();});

  // Arrow button = open/close popover
  if(arrow){
    arrow.addEventListener('click',function(e){
      e.stopPropagation();
      if(pop.classList.contains('open')){closePop();}
      else{openPop();}
    });
  }

  // Close popover when tapping canvas (starting a draw/orbit action)
  renderer.domElement.addEventListener('pointerdown',function(){
    if(pop.classList.contains('open'))closePop();
  });

  // Individual toggle clicks inside view-pop
  document.getElementById('bsurf').addEventListener('click',function(e){
    e.stopPropagation();
    surfGroup.visible=!surfGroup.visible;
    this.classList.toggle('on',surfGroup.visible);
    var pb=document.getElementById('pb-surf');if(pb)pb.classList.toggle('on',surfGroup.visible);
    syncToggleIcon();markDirty();
  });
  document.getElementById('bgrid').addEventListener('click',function(e){
    e.stopPropagation();
    gridH.visible=!gridH.visible;
    this.classList.toggle('on',gridH.visible);
    var pb=document.getElementById('pb-grid');if(pb)pb.classList.toggle('on',gridH.visible);
    syncToggleIcon();markDirty();
  });
  document.getElementById('baxis').addEventListener('click',function(e){
    e.stopPropagation();
    toggleAxis(!axisLinesOn);
    syncToggleIcon();
  });
  document.getElementById('bdepth').addEventListener('click',function(e){
    e.stopPropagation();
    depthCuesOn=!depthCuesOn;
    this.classList.toggle('on',depthCuesOn);
    var pb=document.getElementById('pb-depth');if(pb)pb.classList.toggle('on',depthCuesOn);
    if(_frostedMesh)_frostedMesh.visible=depthCuesOn;
    if(_frostedGridMesh)_frostedGridMesh.visible=depthCuesOn&&_surfGridMode>0;
    if(window._syncFpsDepth)window._syncFpsDepth();
    syncToggleIcon();markDirty();
    toast(depthCuesOn?'Depth on':'Depth off');
  });
  document.getElementById('bdepth-op').addEventListener('click',function(e){
    e.stopPropagation();cycleDepthOp();
  });
  document.getElementById('bsurfgrid').addEventListener('click',function(e){
    e.stopPropagation();cycleSurfGrid();
  });
  document.getElementById('bpersp').addEventListener('click',function(e){
    e.stopPropagation();togglePersp();
    this.textContent=useOrtho?'ORTHO':'PERSP';
  });
  document.getElementById('bgestswap').addEventListener('click',function(e){
    e.stopPropagation();
    twoFingerMode=twoFingerMode==='orbit'?'pan':'orbit';
    updateGestLabel();
    if(stylusOnly){
      toast('1-finger = '+(twoFingerMode==='orbit'?'orbit':'pan'));
    } else {
      toast('2-finger = '+(twoFingerMode==='orbit'?'orbit':'pan'));
    }
  });
  // Scale overlay toggle
  document.getElementById('bscaleoverlay').addEventListener('click',function(e){
    e.stopPropagation();
    toggleGraphicScale(!_gscaleOn);
    toast(_gscaleOn?'Scale cage on':'Scale cage off');
  });
  // Scale select — opens scale picker
  document.getElementById('bscaleselect').addEventListener('click',function(e){
    e.stopPropagation();
    openScalePicker(this);
  });
  // View-pop BG swatches
  document.getElementById('vp-bg-beige').addEventListener('click',function(e){e.stopPropagation();setBgColor('#cdb899','beige');});
  document.getElementById('vp-bg-white').addEventListener('click',function(e){e.stopPropagation();setBgColor('#ffffff','white');});
  document.getElementById('vp-bg-black').addEventListener('click',function(e){e.stopPropagation();setBgColor('#2a2a2e','black');});
  var vpCustom=document.getElementById('vp-bg-custom');
  if(vpCustom)vpCustom.addEventListener('input',function(e){e.stopPropagation();setBgColor(this.value,null);});

  // Close popover on outside click (but not on view-pop itself or toggle buttons)
  document.addEventListener('click',function(e){
    if(pop.classList.contains('open')&&!pop.contains(e.target)&&e.target!==btn&&e.target!==arrow&&!btn.contains(e.target)&&!(arrow&&arrow.contains(e.target))){
      closePop();
    }
  });
  // Also close view-pop in newScene
  window._closeViewPop=closePop;
  window._syncViewToggle=syncToggleIcon;
})();

(function(){

    var cls='sp-item'+(i===exportScaleIdx?' active':'');
    html+='<button class="'+cls+'" data-si="'+i+'">'+displayLbl+'</button>';
  }
  pop.innerHTML=html;

  function syncActive(){
    pop.querySelectorAll('.sp-item').forEach(function(b){
      b.classList.toggle('active',parseInt(b.dataset.si)===exportScaleIdx);
    });
    var isOff=SCALE_STEPS[exportScaleIdx]===null;
    var sqLbl=isOff?'OFF':'1 sq = '+SCALE_LABELS[exportScaleIdx];
    // Sync the view-pop label
    var lbl=document.getElementById('bscaleselect');
    if(lbl)lbl.textContent=sqLbl;
    // Sync em-scale in file menu
    var em=document.getElementById('em-scale');
    if(em){
      em.textContent='Scale: '+(isOff?'OFF':SCALE_LABELS[exportScaleIdx]);
      em.style.opacity=isOff?'0.45':'';
    }
  }

  pop.addEventListener('click',function(e){
    var btn=e.target.closest('.sp-item');
    if(!btn)return;
    e.stopPropagation();
    var idx=parseInt(btn.dataset.si);
    exportScaleIdx=idx;
    syncActive();
    buildScaleBar();updateScaleBarLabel();
    if(_gscaleOn)updateScaleCage();
    // Sync hidden bscale
    var bs=document.getElementById('bscale');
    if(bs){var isOff=SCALE_STEPS[idx]===null;bs.textContent=SCALE_LABELS[idx];bs.style.opacity=isOff?'0.45':'';bs.classList.toggle('on',!isOff);}
    toast(SCALE_STEPS[idx]===null?'Scale off':'1 sq = '+SCALE_LABELS[idx]);
    closeScalePicker();
  });

  function closeScalePicker(){pop.classList.remove('open');}

  window.openScalePicker=function(anchor){
    syncActive();
    pop.classList.add('open');
    var br=anchor.getBoundingClientRect();
    // Position to the right of the anchor or below
    var left=br.right+6;
    var top=br.top;
    // If goes off right edge, position below
    if(left+120>window.innerWidth){left=Math.max(4,br.left);top=br.bottom+4;}
    // If goes off bottom, scroll up
    if(top+320>window.innerHeight)top=Math.max(4,window.innerHeight-324);
    pop.style.top=top+'px';
    pop.style.left=left+'px';
  };
  window.closeScalePicker=closeScalePicker;

  // Close on outside click
  document.addEventListener('click',function(e){
    if(pop.classList.contains('open')&&!pop.contains(e.target)){
      closeScalePicker();
    }
  });
  // Close on canvas tap
  renderer.domElement.addEventListener('pointerdown',function(){
    if(pop.classList.contains('open'))closeScalePicker();
  });
})();

function newScene(){
  // ── Cancel recording if active ──
  if(_recState)stopRecordViews(true);
  // ── Exit FPS mode if active ──
  if(_fpsMode&&window._exitFps)window._exitFps();
  // ── Reset navState to NavCube (fixes stale JOY/FPS label) ──
  if(window._resetNavState)window._resetNavState();

  if(document.body.classList.contains('ui-hidden')){
    document.getElementById('bhide').click();
  }
  // ── Close any open strips ──
  document.getElementById('pages').classList.remove('open');
  document.getElementById('views').classList.remove('open','recording-open','pages-also-open');
  document.body.classList.remove('pages-open','views-open');
  document.getElementById('pgbtn').classList.remove('on');
  document.getElementById('vwbtn').classList.remove('on');

  if(window._hideGviewSlider)window._hideGviewSlider();
  // ── Reset page/view edit mode ──
  _pgEditMode=false;_pgEditIdx=-1;
  _vwEditMode=false;_vwEditIdx=-1;
  // ── Reset strokes + undo ──
  clearAll();
  _redoStack.length=0;redoStack.length=0;

  if(window._clearAllPrimitives)window._clearAllPrimitives();
  if(window._closePrimsStrip)window._closePrimsStrip();

  pages.length=0;curPage=0;
  pages.push({strokes:[],thumb:null,views:[],primitives:[]});
  refreshPageStrip();refreshViewStrip();
  // ── Clear loft ──
  if(window._loftGeo){window._loftGeo.dispose();window._loftGeo=null;}
  window._loftCen=null;
  // ── Reset depth / frosted state before buildSurf ──
  depthCuesOn=true;

  // ── Reset surface to default plane XZ ──
  surfType='plane';curPlane='xz';
  surfPos.set(0,0,0);surfEuler.set(0,0,0);surfScale=1;surfScaleAxes.set(1,1,1);
  surfGroup.visible=true;
  buildSurf();

  ['pb-cyc-surf','pb-cyc-surf2','sb-cyc-surf'].forEach(function(id){
    var b=document.getElementById(id);if(b)b.textContent='Pln';
  });
  var bsurf=document.getElementById('bsurf');if(bsurf)bsurf.classList.add('on');
  // ── Reset grid + axis visibility ──
  gridH.visible=true;
  document.querySelectorAll('#bgrid,#pb-grid').forEach(function(b){if(b)b.classList.add('on');});
  axisLinesOn=true;axisGroup.visible=true;
  document.querySelectorAll('#baxis,#pb-axis').forEach(function(b){if(b)b.classList.add('on');});
  // ── Reset export scale to OFF ──
  exportScaleIdx=0;
  scaleBarGroup.visible=false;_sbMesh.visible=false;
  _gscaleOn=false;_gscaleGroup.visible=false;_gscaleLastIdx=-1;
  var _bso=document.getElementById('bscaleoverlay');if(_bso)_bso.classList.remove('on');
  var _bss=document.getElementById('bscaleselect');if(_bss)_bss.textContent='OFF';
  if(window.closeScalePicker)closeScalePicker();
  var _bscale=document.getElementById('bscale');
  if(_bscale){_bscale.textContent='OFF';_bscale.style.opacity='0.45';_bscale.classList.remove('on');}
  // ── Reset camera ──
  cam.theta=-Math.PI/2;cam.phi=Math.PI/2;cam.radius=10;cam.target.set(0,0,0);
  useOrtho=false;orthoZoom=8;
  document.querySelectorAll('#bpersp,#nav-persp,#pb-nav-persp').forEach(function(b){if(b){b.classList.remove('on');b.textContent='PERSP';}});
  updCam();
  // ── Reset bg color to beige ──
  setBgColor('#cdb899','beige');
  // ── Reset mode + brush ──
  setMode('draw');
  if(window._applySize) window._applySize(1);
  if(window._applyOpacity) window._applyOpacity(95);
  // ── Reset brush toggles ──
  flatBrush=false;
  document.querySelectorAll('#sflat,#pb-flat,#scx-flat').forEach(function(b){if(b)b.classList.remove('on');});
  smoothingOn=false;LAZY=LAZY_OFF;
  document.querySelectorAll('#ssmooth,#pb-smooth,#scx-smooth').forEach(function(b){if(b)b.classList.remove('on');});
  velocityTaper=true;
  document.querySelectorAll('#svel,#pb-vel,#scx-vel').forEach(function(b){if(b)b.classList.add('on');});
  // ── Reset color to black ──
  curColor='#000000';
  document.querySelectorAll('.cw').forEach(function(c){c.classList.toggle('on',c.dataset.c==='#000000');});
  var _cpBtn=document.getElementById('ccpick-btn');if(_cpBtn)_cpBtn.style.borderColor='';
  // ── Reset 2-finger gesture mode ──
  twoFingerMode='orbit';
  updateGestLabel();
  // ── Reset snap to ON ──
  if(window._setSnapEnabled)window._setSnapEnabled(true);
  // ── Reset layers ──
  setActiveLayer(1);
  for(var i=0;i<4;i++){layerVisible[i]=true;}
  applyLayerVisibility();
  showMergeLayerRow(false);
  // ── Reset ruler ──
  if(window._rulerToggle&&window._rulerIsOn&&window._rulerIsOn())window._rulerToggle();
  // ── Reset gizmo scale toggles ──
  if(window._resetGcScale)window._resetGcScale();
  if(window._resetSgScaleMode)window._resetSgScaleMode();
  // ── Clear IDB autosave ──
  try{idbSave(JSON.stringify(sceneData()));}catch(e){}
  // ── Sync view toggle + popover labels ──
  if(window._syncViewToggle)window._syncViewToggle();
  var _vpersp=document.getElementById('bpersp');if(_vpersp)_vpersp.textContent='PERSP';
  twoFingerMode='orbit';updateGestLabel();
  var _emsc=document.getElementById('em-scale');if(_emsc){_emsc.textContent='Scale: OFF';_emsc.style.opacity='0.45';}
  toast('New scene');
}
