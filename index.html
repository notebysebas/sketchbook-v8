// ── Preview line — pre-allocated geometry, updated in-place each point ──────
// Avoids creating new BufferGeometry + LineBasicMaterial on every touchmove.
// Buffer is sized for MAX_PREV_PTS; drawRange tells Three.js how many to draw.
var MAX_PREV_PTS=2048;
var _prevBuf=new Float32Array(MAX_PREV_PTS*3);
var _prevGeo=new THREE.BufferGeometry();
_prevGeo.setAttribute('position',new THREE.BufferAttribute(_prevBuf,3));
_prevGeo.setDrawRange(0,0);
var _prevMat=new THREE.LineBasicMaterial({color:0x1a1a2e,transparent:true,opacity:.75,linewidth:2});
var prevLine=new THREE.Line(_prevGeo,_prevMat);
prevLine.renderOrder=4;
prevLine.frustumCulled=false;
// Not added to scene until first draw; toggled via visible flag
prevLine.visible=false;
scene.add(prevLine);

function updPrev(pts){
  var n=Math.min(pts.length,MAX_PREV_PTS);
  if(n<2){prevLine.visible=false;markDirty();return;}
  // Sync material color/opacity to current brush
  _prevMat.color.set(curColor);
  _prevMat.opacity=brushOp*.75;
  // Write positions into pre-allocated buffer
  for(var i=0;i<n;i++){_prevBuf[i*3]=pts[i].x;_prevBuf[i*3+1]=pts[i].y;_prevBuf[i*3+2]=pts[i].z;}
  _prevGeo.attributes.position.needsUpdate=true;
  _prevGeo.setDrawRange(0,n);
  prevLine.visible=true;
  markDirty();
}

function finStroke(){
  prevLine.visible=false;_prevGeo.setDrawRange(0,0);
  var pts=(smoothPts.length>=2?smoothPts:rawPts).slice();
  rawPts=[];smoothPts=[];velHistory=[];lazyPos=null;
  if(pts.length<1)return;
  // Single-point tap: duplicate with micro-offset so buildTube can make a dot
  if(pts.length===1){var dp=pts[0].clone();dp.x+=0.002;pts.push(dp);}
  // Trim trailing points that reverse or hook at end of stroke.
  // Smooth mode: trim shallow hooks too (dot < 0.15) since lazy smoothing can
  // leave a lagging tail. Raw mode (v14.2): trim disabled entirely (-1.1) so
  // even full reversals survive — preserves the user's original line shape.
  var _trimThresh=smoothingOn?0.15:-1.1;
  if(pts.length>3){
    var _safety=0;
    while(pts.length>3&&_safety<12){
      _safety++;
      var _n=pts.length;
      var _d1=new THREE.Vector3().subVectors(pts[_n-2],pts[_n-3]).normalize();
      var _d2=new THREE.Vector3().subVectors(pts[_n-1],pts[_n-2]).normalize();
      if(_d1.dot(_d2)<_trimThresh){pts=pts.slice(0,_n-1);}
      else{break;}
    }
  }
  const vels=computeVels(pts);
  const g=new THREE.Group();
  const tube=buildTube(pts,vels,curColor,brushSz,brushOp,flatBrush);if(tube)g.add(tube);
  // Always add caps for non-flat strokes (start cap = rounded nib, end cap = rounded tail)
  if(!flatBrush){
    g.add(buildCap(pts[0],curColor,brushSz,brushOp));
    g.add(buildCap(pts[pts.length-1],curColor,brushSz,brushOp));
  }
  const s={pts,vels,color:curColor,sz:brushSz,op:brushOp,flat:flatBrush,layer:activeLayer,mesh:g,_depthKey:''};
  g.matrixAutoUpdate=false;g.updateMatrix();
  scene.add(g);strokes.push(s);
  // New stroke needs depth color assigned — mark it dirty so updateDepth picks it up next frame
  s._depthKey='';
  pushUndo({type:'stroke_add',stroke:s});
  markDirty();
}

// ── Eraser ───────────────────────────────────────────────────────
function tryErase(px,py){
  _refreshRect();
  var r=_cachedRect;
  const sx=px-r.left,sy=py-r.top,W=r.width,H=r.height,ac=activeCam();
  const THRESH=22,tmpV=new THREE.Vector3();
  var bestI=-1,bestDist=THRESH,bestPtIdx=-1;
  for(let i=strokes.length-1;i>=0;i--){
    const s=strokes[i];
    if(!s.mesh.visible)continue;
    s.mesh.updateMatrixWorld(false);
    var mw=s.mesh.matrixWorld;
    const step=Math.max(1,Math.floor(s.pts.length/60));
    var minDist=Infinity,nearMiss=false,minPtIdx=0;
    // Coarse pass
    for(let j=0;j<s.pts.length;j+=step){
      tmpV.copy(s.pts[j]).applyMatrix4(mw);tmpV.project(ac);
      var d=Math.hypot((tmpV.x*.5+.5)*W-sx,(-tmpV.y*.5+.5)*H-sy);
      if(d<minDist){minDist=d;minPtIdx=j;}
      if(d<THRESH*2)nearMiss=true;
    }
    // Dense pass if coarse pass was close — scan the full point list to get true minimum
    if(nearMiss){
      for(let jj=0;jj<s.pts.length;jj++){
        tmpV.copy(s.pts[jj]).applyMatrix4(mw);tmpV.project(ac);
        var dd=Math.hypot((tmpV.x*.5+.5)*W-sx,(-tmpV.y*.5+.5)*H-sy);
        if(dd<minDist){minDist=dd;minPtIdx=jj;}
      }
    }
    if(minDist<bestDist){bestDist=minDist;bestI=i;bestPtIdx=minPtIdx;}
  }
  if(bestI>-1){
    const s=strokes[bestI];const i=bestI;
    if(s===_hoverStroke)setHoverStroke(null);

    if(_partialErase){
      // Partial erase: remove points within screen radius around touch, split remainder
      s.mesh.updateMatrixWorld(false);
      var mw2=s.mesh.matrixWorld;
      var ERASE_R=12+brushSz*3; // sz1→15, sz3→21, sz6→30
      // Use bestPtIdx as center — find contiguous range of points near the touch
      var keepL=[],keepR=[],hitZone=false,pastZone=false;
      for(var pi=0;pi<s.pts.length;pi++){
        tmpV.copy(s.pts[pi]).applyMatrix4(mw2);tmpV.project(ac);
        var pd=Math.hypot((tmpV.x*.5+.5)*W-sx,(-tmpV.y*.5+.5)*H-sy);
        if(pd<ERASE_R){hitZone=true;}
        else if(hitZone&&!pastZone){pastZone=true;keepR.push(s.pts[pi]);}
        else if(pastZone){keepR.push(s.pts[pi]);}
        else{keepL.push(s.pts[pi]);}
      }
      // If no points in radius, do nothing (don't fall through to whole delete)
      if(!hitZone)return false;
      // If entire stroke is within radius, delete the whole thing
      if(!keepL.length&&!keepR.length){
        pushUndo({type:'stroke_delete',stroke:s,index:i});
        strokes.splice(i,1);scene.remove(s.mesh);
        s.mesh.traverse(function(c){if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose();});
        markDirty();return true;
      }
      // Remove original stroke from scene (keep mesh alive for undo)
      scene.remove(s.mesh);
      strokes.splice(i,1);
      // Build halves from remaining points
      var newStrokes=[];
      var halves=[keepL,keepR];
      for(var hi=0;hi<halves.length;hi++){
        var hp=halves[hi];
        if(hp.length<2)continue;
        var hpts=hp.map(function(p){return p.clone();});
        var hvels=computeVels(hpts);
        var hg=new THREE.Group();
        var htube=buildTube(hpts,hvels,s.color,s.sz,s.op,s.flat);
        if(htube)hg.add(htube);
        if(!s.flat){
          hg.add(buildCap(hpts[0],s.color,s.sz,s.op));
          hg.add(buildCap(hpts[hpts.length-1],s.color,s.sz,s.op));
        }
        // Copy original stroke transform
        hg.matrix.copy(s.mesh.matrix);
        hg.matrix.decompose(hg.position,hg.quaternion,hg.scale);
        hg.matrixAutoUpdate=false;
        var ns={pts:hpts,vels:hvels,color:s.color,sz:s.sz,op:s.op,flat:s.flat,layer:s.layer,mesh:hg,_depthKey:''};
        scene.add(hg);strokes.push(ns);
        newStrokes.push(ns);
      }
      pushUndo({type:'stroke_split',original:s,originalIndex:i,newStrokes:newStrokes});
      markDirty();return true;
    }

    // Whole-line erase (default)
    pushUndo({type:'stroke_delete',stroke:s,index:i});
    strokes.splice(i,1);scene.remove(s.mesh);
    s.mesh.traverse(function(c){if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose();});
    markDirty();return true;
  }
  return false;
}

// ── Selection & hover visuals ─────────────────────────────────────
// selectedStrokes: strokes currently selected (yellow line + emissive tint)
// _hoverStroke:    stroke under pointer in select mode (blue/green line, no touch)
//
// All highlight lines use depthTest:false so they always show above geometry.
// Hover: blue = will be added to selection; green = will be removed (already selected).

let selectedStrokes=[],selHighlights=[];
var _hoverStroke=null,_hoverHighlight=null;

var _matSelLine  =new THREE.LineBasicMaterial({color:0xf5c842,transparent:true,opacity:.9,depthTest:false,depthWrite:false});
var _matHoverBlue=new THREE.LineBasicMaterial({color:0x3a9eff,transparent:true,opacity:.85,depthTest:false,depthWrite:false});
var _matHoverGreen=new THREE.LineBasicMaterial({color:0x22dd66,transparent:true,opacity:.85,depthTest:false,depthWrite:false});

function _strokeOverlay(s,mat){
  // Clone each mesh in the stroke group with geometry baked into world space.
  // Uses matrixWorld (not matrix) so it works correctly regardless of scene hierarchy.
  // depthTest:false ensures overlay always shows above all other geometry.
  s.mesh.updateMatrixWorld(true);
  var grp=new THREE.Group();
  grp.frustumCulled=false;
  s.mesh.traverse(function(c){
    if(!c.isMesh||!c.geometry)return;
    var geo=c.geometry.clone();
    // Build combined world matrix: group world * child local matrix
    var worldMat=new THREE.Matrix4();
    worldMat.multiplyMatrices(s.mesh.matrixWorld,c.matrix);
    geo.applyMatrix4(worldMat);
    var m=new THREE.Mesh(geo,mat);
    m.renderOrder=9;m.frustumCulled=false;
    grp.add(m);
  });
  return grp;
}

function _disposeObj(obj){
  if(!obj)return;
  obj.traverse(function(c){
    if(c.geometry)c.geometry.dispose();
    // Don't dispose shared materials (_matSelLine etc) — only per-object ones
  });
  scene.remove(obj);
}

// ── Selected highlights ───────────────────────────────────────────
function updateSelHighlights(){
  selHighlights.forEach(_disposeObj);
  selHighlights=[];
  var mat=new THREE.MeshBasicMaterial({color:0xf5c842,transparent:true,opacity:.75,side:THREE.DoubleSide,depthTest:false,depthWrite:false});
  selectedStrokes.forEach(function(s){
    var grp=_strokeOverlay(s,mat);
    grp.renderOrder=8;
    scene.add(grp);selHighlights.push(grp);
  });
  // Refresh hover color (blue↔green) after selection changes
  var pending=_hoverStroke;
  _hoverStroke=null;
  _updateHoverLine(pending);
  applySelectionTint();
  markDirty();
}

// ── Hover highlight ───────────────────────────────────────────────
function _updateHoverLine(s){
  _disposeObj(_hoverHighlight);
  _hoverHighlight=null;
  _hoverStroke=s||null;
  if(!s){markDirty();return;}
  var col;
  if(mode==='erase'){
    col=0xff2233; // red — will be erased
  } else {
    var isSelected=selectedStrokes.indexOf(s)>-1;
    col=isSelected?0x22dd66:0x3a9eff; // green = deselect, blue = select
  }
  var mat=new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:.82,side:THREE.DoubleSide,depthTest:false,depthWrite:false});
  var grp=_strokeOverlay(s,mat);
  grp.renderOrder=9;
  scene.add(grp);_hoverHighlight=grp;
  markDirty();
}

function setHoverStroke(s){
  var isSel=s&&selectedStrokes.indexOf(s)>-1;
  var isErase=mode==='erase';
  // Skip if same stroke and same color would result
  if(s===_hoverStroke&&_hoverHighlight){
    var curColor=_hoverHighlight.children&&_hoverHighlight.children[0]&&
      _hoverHighlight.children[0].material&&
      _hoverHighlight.children[0].material.color.getHex();
    var wantColor=isErase?0xff2233:(isSel?0x22dd66:0x3a9eff);
    if(curColor===wantColor)return;
  } else if(s===_hoverStroke&&!_hoverHighlight&&!s){
    return;
  }
  _updateHoverLine(s);
}

var _fnsVFrustum=new THREE.Frustum();
var _fnsVProjMat=new THREE.Matrix4();
function findNearestStroke(px,py){
  _refreshRect();
  var r=_cachedRect;
  var sx=px-r.left,sy=py-r.top,W=r.width,H=r.height,ac=activeCam();
  // Build frustum for culling
  ac.updateMatrixWorld(false);
  _fnsVProjMat.multiplyMatrices(ac.projectionMatrix,ac.matrixWorldInverse);
  _fnsVFrustum.setFromProjectionMatrix(_fnsVProjMat);
  var THRESH=32,tmpV=new THREE.Vector3();
  var bestStroke=null,bestDist=THRESH;
  for(var i=strokes.length-1;i>=0;i--){
    var s=strokes[i];
    if(!s.mesh.visible)continue;
    s.mesh.updateMatrixWorld(false);
    var mw=s.mesh.matrixWorld;
    // Quick frustum cull using bounding sphere of stroke points
    if(s.pts.length>4){
      var mid=s.pts[Math.floor(s.pts.length/2)];
      tmpV.copy(mid).applyMatrix4(mw);
      if(!_fnsVFrustum.containsPoint(tmpV)){
        // Check endpoints too before skipping
        tmpV.copy(s.pts[0]).applyMatrix4(mw);
        var ep0In=_fnsVFrustum.containsPoint(tmpV);
        if(!ep0In){
          tmpV.copy(s.pts[s.pts.length-1]).applyMatrix4(mw);
          if(!_fnsVFrustum.containsPoint(tmpV))continue;
        }
      }
    }
    var step=Math.max(1,Math.floor(s.pts.length/60));
    var minDist=Infinity,nearMiss=false;
    for(var j=0;j<s.pts.length;j+=step){
      tmpV.copy(s.pts[j]).applyMatrix4(mw);tmpV.project(ac);
      var d=Math.hypot((tmpV.x*.5+.5)*W-sx,(-tmpV.y*.5+.5)*H-sy);
      if(d<minDist)minDist=d;
      if(d<THRESH){nearMiss=false;break;}
      if(d<THRESH*2)nearMiss=true;
    }
    // Dense pass if coarse pass was close but not inside threshold
    if(nearMiss){
      for(var jj=0;jj<s.pts.length;jj++){
        tmpV.copy(s.pts[jj]).applyMatrix4(mw);tmpV.project(ac);
        var dd=Math.hypot((tmpV.x*.5+.5)*W-sx,(-tmpV.y*.5+.5)*H-sy);
        if(dd<minDist)minDist=dd;
      }
    }
    if(minDist<bestDist){bestDist=minDist;bestStroke=s;}
  }
  return bestStroke;
}

// ── Emissive tint for selected strokes ────────────────────────────
var SEL_EMISSIVE=new THREE.Color(0xf5c842);
var SEL_EMISSIVE_INT=0.35;
function applySelectionTint(){
  strokes.forEach(function(s){
    var isSel=selectedStrokes.indexOf(s)>-1;
    s.mesh.traverse(function(c){
      if(!c.isMesh||!c.material||!c.material.emissive)return;
      c.material.emissive=isSel?SEL_EMISSIVE.clone():new THREE.Color(0x000000);
      c.material.emissiveIntensity=isSel?SEL_EMISSIVE_INT:0;
      c.material.needsUpdate=true;
    });
  });
  markDirty();
}

// ── clearSelection ────────────────────────────────────────────────
function clearSelection(){
  selectedStrokes=[];
  selHighlights.forEach(_disposeObj);selHighlights=[];
  _updateHoverLine(null);
  applySelectionTint();
  _hideSgizmo();
  if(window._sgGcDraw)window._sgGcDraw();
  if(window._syncLoftSolidBtn)window._syncLoftSolidBtn();
  markDirty();
}

// ── selectStroke (on click/tap) ───────────────────────────────────
function selectStroke(px,py,addToSelection){
  if(!addToSelection)clearSelection();
  var bestStroke=findNearestStroke(px,py);
  if(bestStroke){
    var idx=selectedStrokes.indexOf(bestStroke);
    if(idx>-1)selectedStrokes.splice(idx,1);
    else selectedStrokes.push(bestStroke);
    updateSelHighlights();
    if(selectedStrokes.length>0){
      positionStrokeGizmo();
      _showSgizmo();
      if(window._sgGcDraw)window._sgGcDraw();
      if(window._syncLoftSolidBtn)window._syncLoftSolidBtn();
      if(window._syncSgControls)window._syncSgControls();
    } else {
      _hideSgizmo();
    }
    return true;
  }
  if(!addToSelection)_hideSgizmo();
  if(window._syncLoftSolidBtn)window._syncLoftSolidBtn();
  return false;
}
var _sgizmoDragged=false;

    sg.style.left='10px';sg.style.top='52px';sg.style.right='';
  }

}
// Show/hide sgizmo — when visible, add gc-hosted class to hide canvas
// (gc canvas renders the gizmo instead), show only property controls
function _showSgizmo(){

function _hideSgizmo(){

// ── Sgizmo drag ──
(function(){
  var sg=document.getElementById('sgizmo');
  var handle=document.getElementById('sgizmo-handle');
  if(!sg||!handle)return;
  var dragState=null;
  function onStart(e){
    e.preventDefault();e.stopPropagation();
    var src=e.touches?e.touches[0]:e;
    var r=sg.getBoundingClientRect();
    dragState={ox:src.clientX-r.left,oy:src.clientY-r.top};
  }
  function onMove(e){
    if(!dragState)return;
    e.preventDefault();
    var src=e.touches?e.touches[0]:e;
    var nx=src.clientX-dragState.ox;
    var ny=src.clientY-dragState.oy;
    var sw=sg.offsetWidth,sh=sg.offsetHeight;
    nx=Math.max(0,Math.min(window.innerWidth-sw,nx));
    ny=Math.max(0,Math.min(window.innerHeight-sh,ny));
    sg.style.left=nx+'px';sg.style.top=ny+'px';
    _sgizmoDragged=true;
  }
  function onEnd(){dragState=null;}
  handle.addEventListener('touchstart',onStart,{passive:false});
  handle.addEventListener('touchmove',onMove,{passive:false});
  handle.addEventListener('touchend',onEnd);
  handle.addEventListener('mousedown',onStart);
  document.addEventListener('mousemove',function(e){if(dragState)onMove(e);});
  document.addEventListener('mouseup',onEnd);
})();

// ── Multi-select add mode ─────────────────────────────────────────
// Always-on: every tap appends/toggles selection — no need to press +ADD.
// _selAddMode stays true permanently; clearSelection no longer resets it.
var _selAddMode=true;
function setSelAddMode(on){
  _selAddMode=on;
  var btn=document.getElementById('sg-addmode');
  if(btn)btn.classList.toggle('on',on);
}
function deleteSelected(){
  if(!selectedStrokes.length)return;
  const count=selectedStrokes.length;
  selectedStrokes.slice().forEach(s=>{
    const i=strokes.indexOf(s);
    if(i>-1){pushUndo({type:'stroke_delete',stroke:s,index:i});strokes.splice(i,1);scene.remove(s.mesh);s.mesh.traverse(c=>{if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose();});}
  });
  clearSelection();toast('Deleted '+count+' stroke'+(count>1?'s':''));
}
function duplicateSelected(){
  if(!selectedStrokes.length)return;
  const duped=[];
  selectedStrokes.forEach(s=>{
    const newG=new THREE.Group();
    const newPts=s.pts.map(p=>p.clone());
    const vels=computeVels(newPts);
    const tube=buildTube(newPts,vels,s.color,s.sz,s.op,s.flat);if(tube)newG.add(tube);
    if(!s.flat){newG.add(buildCap(newPts[0],s.color,s.sz,s.op));newG.add(buildCap(newPts[newPts.length-1],s.color,s.sz,s.op));}
    // Copy the source mesh's transform matrix exactly — duplicate lands on the original
    newG.matrix.copy(s.mesh.matrix);
    newG.matrix.decompose(newG.position,newG.quaternion,newG.scale);
    newG.matrixAutoUpdate=false;
    const ns={pts:newPts,vels,color:s.color,sz:s.sz,op:s.op,flat:s.flat,layer:s.layer,mesh:newG,_depthKey:''};
    scene.add(newG);strokes.push(ns);
    pushUndo({type:'stroke_duplicate',newStroke:ns});
    duped.push(ns);
  });
  // Re-select the duplicates
  clearSelection();
  selectedStrokes=duped;
  updateSelHighlights();
  if(selectedStrokes.length>0){positionStrokeGizmo();_showSgizmo();}
  if(window._sgGcDraw)window._sgGcDraw();

// ── Merge layer ────────────────────────────────────────────────────
function mergeLayer(srcLayer){
  var toMerge=strokes.filter(function(s){return(s.layer!=null?s.layer:1)===srcLayer;});
  if(!toMerge.length){toast('Nothing on layer');return;}

  // Build merged group with all geometry baked to world space
  var mergedGroup=new THREE.Group();
  toMerge.forEach(function(s){
    s.mesh.traverse(function(c){
      if(!c.isMesh||!c.geometry)return;
      var geo=c.geometry.clone();
      geo.applyMatrix4(s.mesh.matrix);
      var mat=c.material.clone();
      var m=new THREE.Mesh(geo,mat);
      m.renderOrder=3;
      mergedGroup.add(m);
    });
  });
  mergedGroup.matrixAutoUpdate=false;
  mergedGroup.updateMatrix();

  // Remove any existing merged stroke on layer 3
  var replacedMerged=strokes.filter(function(s){return s.layer===3;});
  replacedMerged.forEach(function(s){
    var idx=strokes.indexOf(s);
    if(idx>-1){strokes.splice(idx,1);}
    scene.remove(s.mesh);
  });

  // Remove originals
  var savedOrigIndices=[];
  toMerge.forEach(function(s){
    var idx=strokes.indexOf(s);
    if(idx>-1)savedOrigIndices.push(idx);
    scene.remove(s.mesh);
  });
  savedOrigIndices.sort(function(a,b){return b-a;}).forEach(function(i){strokes.splice(i,1);});

  scene.add(mergedGroup);
  var mergeColor=toMerge[0]?toMerge[0].color:'#1a1a2e';
  var mergedStroke={pts:[new THREE.Vector3()],vels:[0],color:mergeColor,sz:1,op:1,flat:false,layer:3,mesh:mergedGroup,_depthKey:''};
  strokes.push(mergedStroke);

  _undoStack.push({type:'merge_layer',srcLayer:srcLayer,origStrokes:toMerge,savedOrigIndices:savedOrigIndices,mergedStroke:mergedStroke,replacedMerged:replacedMerged});
  _redoStack.length=0;redoStack.length=0;

  showMergeLayerRow(true);
  applyLayerVisibility();
  markDirty();
  toast('Merged to layer 3');
}

// Smooth lerp to saved view — duration scales with distance (1s–3s)
var _vwLerp=null;
function recallView(v){
  // Restore plane instantly
  if(v.surf){
    surfType=v.surf.type||surfType;curPlane=v.surf.plane||curPlane;
    surfPos.set(v.surf.px||0,v.surf.py||0,v.surf.pz||0);
    surfEuler.set(v.surf.rx||0,v.surf.ry||0,v.surf.rz||0);
    surfScale=v.surf.sc||1;surfScaleAxes.set(v.surf.sax||1,v.surf.say||1,v.surf.saz||1);
    buildSurf();syncSurf();
    document.querySelectorAll('[data-surf]').forEach(function(b){b.classList.toggle('on',b.dataset.surf===surfType);});
    document.querySelectorAll('[data-plane]').forEach(function(b){b.classList.toggle('on',b.dataset.plane===curPlane);});
  }
  // Smooth lerp camera
  var c=v.cam;
  var startTheta=cam.theta,startPhi=cam.phi,startRadius=cam.radius;
  var startTx=cam.target.x,startTy=cam.target.y,startTz=cam.target.z;
  var endTheta=c.theta,endPhi=c.phi,endRadius=c.radius;
  var endTx=c.tx||0,endTy=c.ty||0,endTz=c.tz||0;
  // Scale duration by how far the camera needs to travel (1s–3s)
  var dTheta=Math.abs(endTheta-startTheta),dPhi=Math.abs(endPhi-startPhi);
  var dTarget=Math.sqrt(Math.pow(endTx-startTx,2)+Math.pow(endTy-startTy,2)+Math.pow(endTz-startTz,2));
  var dRadius=Math.abs(endRadius-startRadius);
  var angularDist=Math.sqrt(dTheta*dTheta+dPhi*dPhi); // radians
  var totalDist=angularDist/Math.PI+dTarget/5+dRadius/10; // normalised 0..1+
  var dur=Math.min(3000,Math.max(1000,totalDist*2500));

  // ── Smooth ortho/persp transition ──
  // Instead of snapping useOrtho at the end, lerp orthoZoom to/from a value
  // that matches the perspective frustum, so the visual transition is gradual.
  var targetOrtho=c.ortho||false;
  var targetOrthoZoom=c.orthoZoom||8;
  var startOrthoZoom=orthoZoom;
  var needsOrthoTransition=targetOrtho!==useOrtho;
  var CAM_FOV_HALF_TAN=Math.tan(27.5*Math.PI/180); // half of 55° FOV

  if(needsOrthoTransition){
    if(targetOrtho){
      // Persp → Ortho: switch to ortho immediately with zoom matching perspective
      useOrtho=true;
      startOrthoZoom=startRadius*CAM_FOV_HALF_TAN;
      orthoZoom=startOrthoZoom;
      syncOrtho();
    } else {
      // Ortho → Persp: keep ortho during animation, lerp zoom toward perspective-matching
      // value, then flip at the very end
      startOrthoZoom=orthoZoom;
      targetOrthoZoom=endRadius*CAM_FOV_HALF_TAN;
    }
  } else if(useOrtho){
    // Both ortho — just lerp zoom directly
    startOrthoZoom=orthoZoom;
  }

  if(_vwLerp)cancelAnimationFrame(_vwLerp);
  if(_orthoLerp){cancelAnimationFrame(_orthoLerp);_orthoLerp=null;}
  var startT=performance.now();
  function step(){
    var t=Math.min(1,(performance.now()-startT)/dur);
    var e=t<1?t*(2-t):1; // ease out quad
    cam.theta=startTheta+(endTheta-startTheta)*e;
    cam.phi=startPhi+(endPhi-startPhi)*e;
    cam.radius=startRadius+(endRadius-startRadius)*e;
    cam.target.x=startTx+(endTx-startTx)*e;
    cam.target.y=startTy+(endTy-startTy)*e;
    cam.target.z=startTz+(endTz-startTz)*e;
    // Lerp orthoZoom during transition
    if(needsOrthoTransition&&!targetOrtho&&useOrtho&&e>=0.85){
      // Ortho→Persp: flip to persp slightly before end so remaining motion masks the switch
      useOrtho=false;
    }
    if(useOrtho){
      orthoZoom=startOrthoZoom+(targetOrthoZoom-startOrthoZoom)*e;
      syncOrtho();
    }
    updCam();markDirty();
    if(t<1){_vwLerp=requestAnimationFrame(step);}
    else{
      _vwLerp=null;
      // Finalize ortho state
      if(needsOrthoTransition&&!targetOrtho){
        // Ortho→Persp: now flip to persp
        useOrtho=false;
      }
      orthoZoom=targetOrtho?(c.orthoZoom||8):orthoZoom;
      syncOrtho();updCam();
      var txt=useOrtho?'ORTHO':'PERSP';
      ['bpersp','nav-persp','pb-nav-persp'].forEach(function(id){
        var b=document.getElementById(id);
        if(b){b.textContent=txt;b.classList.toggle('on',useOrtho);}
      });
      markDirty();
    }
  }
  step();
}

function expSVG(expName){
  if(!strokes.length){alert('Nothing to export.');return;}
  _refreshRect();
  var r=_cachedRect;
  var W=r.width,H=r.height,ac=activeCam();
  ac.updateMatrixWorld(false);
  var tmpV=new THREE.Vector3();
  var paths=[];
  for(var i=0;i<strokes.length;i++){
    var s=strokes[i];
    if(!s.mesh.visible)continue;
    if(s.pts.length<2)continue;
    s.mesh.updateMatrixWorld(false);
    var mw=s.mesh.matrixWorld;
    // Project all points to screen space
    var proj=[];
    for(var j=0;j<s.pts.length;j++){
      tmpV.copy(s.pts[j]).applyMatrix4(mw);tmpV.project(ac);
      // Skip points behind camera
      if(tmpV.z>1)continue;
      proj.push({x:(tmpV.x*.5+.5)*W,y:(-tmpV.y*.5+.5)*H});
    }
    if(proj.length<2)continue;
    // Build SVG path data
    var d='M'+proj[0].x.toFixed(2)+' '+proj[0].y.toFixed(2);
    for(var k=1;k<proj.length;k++){
      d+=' L'+proj[k].x.toFixed(2)+' '+proj[k].y.toFixed(2);
    }
    // Stroke width: map brush size to screen pixels (approximate)
    // s.sz=1 → baseR=0.011 in world units; project a small offset to estimate pixel width
    var midIdx=Math.floor(s.pts.length/2);
    var p0=tmpV.copy(s.pts[midIdx]).applyMatrix4(mw);
    var sx0=new THREE.Vector3().copy(p0).project(ac);
    var baseR=s.sz*0.011;
    var p1=new THREE.Vector3(p0.x+baseR,p0.y,p0.z);
    var sx1=p1.project(ac);
    var sw=Math.abs((sx1.x-sx0.x)*0.5*W)*2;
    if(sw<0.5)sw=0.5;
    if(sw>50)sw=50;
    // Opacity
    var op=s.op!==undefined?s.op:1;
    paths.push('<path d="'+d+'" fill="none" stroke="'+s.color+'" stroke-width="'+sw.toFixed(2)+'" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="'+op.toFixed(2)+'"/>');
  }
  if(!paths.length){alert('No visible strokes to export.');return;}
  var svg='<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">\n<rect width="100%" height="100%" fill="none"/>\n'+paths.join('\n')+'\n</svg>';
  var blob=new Blob([svg],{type:'image/svg+xml'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=(expName||'sketch3d')+'.svg';a.click();
  URL.revokeObjectURL(url);toast('SVG exported');
}

// ── IndexedDB auto-save (replaces localStorage) ────────────────────
// Same 30s interval, same JSON format, much higher quota
// Falls back to localStorage if IndexedDB unavailable
var _idb=null;
var _idbReadyCallbacks=[];
function _onIdbReady(cb){if(_idb){cb(_idb);}else{_idbReadyCallbacks.push(cb);}}
(function(){
  try{
    var req=indexedDB.open('sketch3d',1);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      if(!db.objectStoreNames.contains('autosave'))db.createObjectStore('autosave');
    };
    req.onsuccess=function(e){
      _idb=e.target.result;
      // One-time migration from localStorage
      try{
        var old=localStorage.getItem('sk3d_auto');
        if(old){
          var tx=_idb.transaction('autosave','readwrite');
          tx.objectStore('autosave').put(old,'sk3d_auto');
          localStorage.removeItem('sk3d_auto');
        }
      }catch(e2){}
      // Fire all waiting callbacks
      var cbs=_idbReadyCallbacks.splice(0);
      for(var i=0;i<cbs.length;i++){try{cbs[i](_idb);}catch(e3){}}
    };
    req.onerror=function(){_idb=null;};
  }catch(e){_idb=null;}
})();

function idbSave(dataStr){
  if(_idb){
    try{
      var tx=_idb.transaction('autosave','readwrite');
      tx.objectStore('autosave').put(dataStr,'sk3d_auto');
      return;
    }catch(e){}
  }
  try{localStorage.setItem('sk3d_auto',dataStr);}catch(e){}
}

function idbLoad(cb){
  if(_idb){
    try{
      var tx=_idb.transaction('autosave','readonly');
      var req=tx.objectStore('autosave').get('sk3d_auto');
      req.onsuccess=function(e){cb(e.target.result||null);};
      req.onerror=function(){cb(null);};
      return;
    }catch(e){}
  }

  try{cb(localStorage.getItem('sk3d_auto'));}catch(e){cb(null);}

// Save on tab/PWA visibility changes and page unload — Android aggressively
// backgrounds and reclaims PWAs; without these handlers, up to 30 seconds of
// work was lost between autosave ticks when the user swiped away.
(function(){
  var _lastSaveAt=0;
  function _flushSave(){
    try{
      // Rate-limit to once per 500ms so rapid visibility thrashes don't thrash IDB
      var now=Date.now();if(now-_lastSaveAt<500)return;
      _lastSaveAt=now;
      var str=JSON.stringify(sceneData());
      // Synchronous localStorage write is our safety net — IDB writes are async
      // and may not flush before the page is killed. localStorage always flushes.
      try{localStorage.setItem('sk3d_auto',str);}catch(e){}
      // Best-effort IDB write
      try{idbSave(str);}catch(e){}
    }catch(e){}
  }
  // visibilitychange fires when tab is hidden — Android PWA triggers this reliably
  document.addEventListener('visibilitychange',function(){
    if(document.visibilityState==='hidden')_flushSave();
  });
  // pagehide is the modern, reliable unload trigger — fires on iOS Safari too
  window.addEventListener('pagehide',_flushSave);
  // beforeunload for desktop browsers and legacy fallback
  window.addEventListener('beforeunload',_flushSave);
  // Expose for manual triggers (e.g. after destructive actions)
  window._flushAutosave=_flushSave;
})();

//  RECORD VIEWS — auto-play all saved views and capture to webm
// ================================================================
var _recState=null; // {recorder, chunks, cancelled}
function startRecordViews(){
  var views=pages[curPage]&&pages[curPage].views;
  if(!views||views.length<2){toast('Need 2+ saved views to record');return;}
  // Check MediaRecorder support
  var canvasEl=renderer.domElement;
  if(typeof canvasEl.captureStream!=='function'){toast('Recording not supported on this device');return;}
  // Try MP4 first (Safari), then WebM (Chrome/Firefox)
  var mimeType='';var fileExt='.mp4';
  var tryTypes=['video/mp4','video/mp4;codecs=avc1','video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'];
  for(var ti=0;ti<tryTypes.length;ti++){
    try{if(MediaRecorder.isTypeSupported(tryTypes[ti])){mimeType=tryTypes[ti];break;}}catch(ex){}
  }
  if(!mimeType){toast('Recording not supported on this device');return;}
  if(mimeType.indexOf('webm')>=0)fileExt='.webm';

  // Save overlay visibility and hide for clean recording
  var _recOverlayState={grid:gridH.visible,axis:axisGroup.visible,surf:surfGroup.visible};
  window._recOverlayState=_recOverlayState;
  gridH.visible=false;axisGroup.visible=false;surfGroup.visible=false;markDirty();

  // Hide UI for clean recording
  if(!document.body.classList.contains('ui-hidden')){
    document.getElementById('bhide').click();
  }
  // Close any open strips
  document.getElementById('views').classList.remove('open','recording-open','pages-also-open');
  document.getElementById('pages').classList.remove('open');
  document.body.classList.remove('views-open','pages-open');

  // Start capture
  var stream;
  try{stream=canvasEl.captureStream(30);}catch(ex){toast('Recording failed: '+ex.message);return;}
  var recorder;
  try{recorder=new MediaRecorder(stream,{mimeType:mimeType,videoBitsPerSecond:4000000});}catch(ex){toast('Recording failed: '+ex.message);return;}
  var chunks=[];
  _recState={recorder:recorder,chunks:chunks,cancelled:false};
  recorder.ondataavailable=function(e){if(e.data&&e.data.size>0)chunks.push(e.data);};
  recorder.onstop=function(){
    if(_recState&&_recState.cancelled){_recState=null;toast('Recording cancelled');return;}
    var recChunks=_recState?_recState.chunks:chunks;
    _recState=null;
    if(!recChunks.length){toast('No recording data');return;}
    var blob=new Blob(recChunks,{type:mimeType});
    promptExportName('sketch3d-views',fileExt,function(name){
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download=name+fileExt;a.click();
      URL.revokeObjectURL(url);toast('Recording saved');
    });
  };
  recorder.onerror=function(){
    _recState=null;
    document.getElementById('rec-stop-btn').classList.remove('vis');
    toast('Recording error');
  };
  recorder.start();
  // Show stop button
  document.getElementById('rec-stop-btn').classList.add('vis');
  toast('Recording started');

  // Render one initial frame then begin sequencing views
  renderer.render(scene,activeCam());markDirty();
  // Small delay before starting the animation sequence
  setTimeout(function(){_recPlayViews(views,0);},500);
}

function _recPlayViews(views,idx){
  if(!_recState||_recState.cancelled)return;
  if(idx>=views.length){
    // All views played — hold final frame for 1s then stop
    setTimeout(function(){stopRecordViews(false);},1000);
    return;
  }
  // Recall this view (triggers smooth lerp animation)
  recallView(views[idx]);
  // Wait for the animation to complete (recallView duration is 1-3s, we poll _vwLerp)
  function waitForLerp(){
    if(!_recState||_recState.cancelled)return;
    if(_vwLerp!=null){
      // Animation still in progress
      requestAnimationFrame(waitForLerp);
    } else {
      // Animation complete — hold for 800ms then move to next view
      setTimeout(function(){_recPlayViews(views,idx+1);},800);
    }
  }
  // Start polling after a frame to let recallView kick off
  requestAnimationFrame(waitForLerp);
}

function stopRecordViews(cancel){
  if(!_recState)return;
  if(cancel)_recState.cancelled=true;
  document.getElementById('rec-stop-btn').classList.remove('vis');
  // Cancel any in-progress view lerp
  if(_vwLerp){cancelAnimationFrame(_vwLerp);_vwLerp=null;}
  try{if(_recState.recorder.state!=='inactive')_recState.recorder.stop();}catch(ex){}
  // Restore overlay visibility
  if(window._recOverlayState){
    gridH.visible=window._recOverlayState.grid;
    axisGroup.visible=window._recOverlayState.axis;
    surfGroup.visible=window._recOverlayState.surf;
    window._recOverlayState=null;
    // Sync button states
    var bg=document.getElementById('bgrid');if(bg)bg.classList.toggle('on',gridH.visible);
    var ba=document.getElementById('baxis');if(ba)ba.classList.toggle('on',axisGroup.visible);
    var bs=document.getElementById('bsurf');if(bs)bs.classList.toggle('on',surfGroup.visible);
    var pbg=document.getElementById('pb-grid');if(pbg)pbg.classList.toggle('on',gridH.visible);
    var pba=document.getElementById('pb-axis');if(pba)pba.classList.toggle('on',axisGroup.visible);
    var pbs=document.getElementById('pb-surf');if(pbs)pbs.classList.toggle('on',surfGroup.visible);
    markDirty();
  }
  // Restore UI
  if(document.body.classList.contains('ui-hidden')){
    document.getElementById('bhide').click();
  }
}

    ctx.font='600 7px DM Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(ax.toUpperCase(),lx,ly);
    ctx.restore();
  }
  function drawSgBox(ax,active){const b=_sgSignedBoxPos(ax),col=COL[ax],hlit=sgHov==='s'+ax||active,S=hlit?11:9;ctx.save();ctx.strokeStyle=hlit?_themeInk(.9):col;ctx.fillStyle=hlit?col+'30':col+'18';ctx.lineWidth=hlit?2:1.6;ctx.globalAlpha=hlit?1:.85;ctx.beginPath();ctx.rect(b.x-S/2,b.y-S/2,S,S);ctx.stroke();ctx.fill();ctx.restore();}
  function drawSgUniform(active){const hlit=sgHov==='su'||active;ctx.save();ctx.fillStyle=_themeInk(.08);ctx.strokeStyle=hlit?_themeInk(.8):_themeInk(.45);ctx.lineWidth=hlit?2:1.4;ctx.globalAlpha=hlit?1:.7;ctx.beginPath();ctx.arc(CX,CY,5,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore();}

  function sgDraw(){ _sgUnifiedDraw(); }

  function sgHitTest(mx,my,isTouch){
    if(!selectedStrokes.length) return null;
    _sgComputeLayout2();
    if(!_sgLayout2) return null;
    var sgl=_sgLayout2;
    var sdx=mx-sgl.cx,sdy=my-sgl.cy;
    var sdist=Math.sqrt(sdx*sdx+sdy*sdy);
    var sang=Math.atan2(sdy,sdx);
    var axes=['x','y','z'];
    var hitArcs   =(sgMode==='all'||sgMode==='rotate');
    var hitArrows =(sgMode==='all'||sgMode==='move');
    var hitScale  =(sgMode==='all'||sgMode==='scale');
    var arcTol = isTouch ? 18 : 9;
    var sgW = isTouch ? 48 : 14;
    var inArcZone = Math.abs(sdist-SG_RING_R2) < arcTol;
    // Center (uniform scale) — always visible in all/scale mode
    if((sgMode==='all'||sgMode==='scale')&&sdist<=SG_CENTER_R+(isTouch?8:0)) return 'su';
    // Touch: test arrows first when clearly outside arc zone
    if(isTouch && (hitArrows||hitScale) && !inArcZone){
      for(var sk=0;sk<axes.length;sk++){
        var sak=axes[sk],sangk=sgl.axisAngles[sak];
        var sacsk=Math.cos(sangk),sask=Math.sin(sangk);
        var salk=sdx*sacsk+sdy*sask;
        var sperk=Math.abs(sdx*(-sask)+sdy*sacsk);
        if(salk>=SG_RING_R2*0.4&&salk<=SG_ARROW+SG_HEAD_L&&sperk<sgW){
          var useScaleK=(sgMode==='scale')||(sgMode==='all'&&_sgScaleMode);
          return useScaleK?'s'+sak:'a'+sak;
        }
      }
    }
    // Arc hits
    if(hitArcs && inArcZone){
      function normSgA2(a){return((a%(Math.PI*2))+Math.PI*2)%(Math.PI*2);}
      for(var si2=0;si2<axes.length;si2++){
        var sax2=axes[si2],sarc2=sgl.arcs[sax2];
        var ss2=normSgA2(sarc2.start),se2=normSgA2(sarc2.end),sa2=normSgA2(sang);
        var shit2=(se2>=ss2)?(sa2>=ss2&&sa2<=se2):(sa2>=ss2||sa2<=se2);
        if(shit2){_sgGrabT=sang;return'r'+sax2;}
      }
    }
    // Arrow / scale hits
    if(hitArrows||hitScale){
      for(var sj=0;sj<axes.length;sj++){
        var sax3=axes[sj],sang3=sgl.axisAngles[sax3];
        var sacos=Math.cos(sang3),sasin=Math.sin(sang3);
        var salong=sdx*sacos+sdy*sasin;
        var saperp=Math.abs(sdx*(-sasin)+sdy*sacos);
        if(salong>=SG_RING_R2*0.4&&salong<=SG_ARROW+SG_HEAD_L&&saperp<sgW){
          var useScale=(sgMode==='scale')||(sgMode==='all'&&_sgScaleMode);
          return useScale?'s'+sax3:'a'+sax3;
        }
      }
    }
    return null;
  }

  function sgGetPos(e){const r=sgc.getBoundingClientRect(),src=e.touches&&e.touches.length>0?e.touches[0]:e.changedTouches&&e.changedTouches.length>0?e.changedTouches[0]:e;var rw=r.width||1,rh=r.height||1;return{x:(src.clientX-r.left)*(sgc.width/rw),y:(src.clientY-r.top)*(sgc.height/rh)};}

  // Compute centroid of all selected strokes (world space)
  function selectionCentroid(){
    const c=new THREE.Vector3();
    selectedStrokes.forEach(s=>{
      const wpts=s.pts.map(p=>p.clone().applyMatrix4(s.mesh.matrix));
      const sc=new THREE.Vector3();wpts.forEach(p=>sc.add(p));sc.divideScalar(wpts.length);
      c.add(sc);
    });
    return c.divideScalar(selectedStrokes.length);
  }

  function sgApplyDrag(p){
    if(!sgDrag||!selectedStrokes.length)return;
    const dx=p.x-sgDrag.sx,dy=p.y-sgDrag.sy,h=sgDrag.h;
    const centroid=sgDrag.centroid;
    var _sgPrecVal = '';

    selectedStrokes.forEach((s,si)=>{
      const mesh=s.mesh;
      // Restore from saved start matrix
      mesh.matrix.copy(sgDrag.oMatrices[si]);
      mesh.matrix.decompose(mesh.position,mesh.quaternion,mesh.scale);

      if(h.startsWith('a')){
        const ax=h[1];
        var _sgFL=sgDrag.frozenLayout||_sgLayout2;
        var sgang=_sgFL?_sgFL.axisAngles[ax]:0;
        var sgproj=(dx*Math.cos(sgang)+dy*Math.sin(sgang))*0.028;
        var sgdir=WORLD[ax].clone();
        if(_sgFL&&_sgFL.flipped[ax]) sgdir.negate();
        mesh.position.addScaledVector(sgdir,sgproj);
        // also re-offset from oMatrix base:
        mesh.matrix.copy(sgDrag.oMatrices[si]); mesh.matrix.decompose(mesh.position,mesh.quaternion,mesh.scale);
        mesh.position.addScaledVector(sgdir,sgproj);
        if(si===0 && window._precisionMode){
          _sgPrecVal=ax.toUpperCase()+' Δ'+formatDist(sgproj);
        }
      }else if(h.startsWith('r')){
        // v21: flat 2D tangent at grab screen angle
        const ax=h[1];
        const grabAngle=sgDrag.grabT;
        const tx=-Math.sin(grabAngle),ty=Math.cos(grabAngle);
        const proj=(dx*tx+dy*ty)*0.022;
        const angle=ax==='z'?-proj:proj;
        const q=new THREE.Quaternion();
        if(ax==='x')q.setFromAxisAngle(new THREE.Vector3(1,0,0),angle);
        if(ax==='y')q.setFromAxisAngle(new THREE.Vector3(0,1,0),angle);
        if(ax==='z')q.setFromAxisAngle(new THREE.Vector3(0,0,1),angle);
        // Orbit position around centroid
        const offset=mesh.position.clone().sub(centroid);
        offset.applyQuaternion(q);
        mesh.position.copy(centroid).add(offset);
        mesh.quaternion.premultiply(q);
        if(si===0 && window._precisionMode) _sgPrecVal=ax.toUpperCase()+': '+(angle*180/Math.PI).toFixed(1)+'°';
      }else if(h.startsWith('s')&&h!=='su'){
        const ax=h[1],d=aDir(ax),proj=1+(dx*d.nx+dy*d.ny)*.015;
        // Scale away from centroid
        const offset=mesh.position.clone().sub(centroid);
        if(ax==='x'){mesh.scale.x=Math.max(.05,sgDrag.oScales[si].x*proj);offset.x*=proj;}
        if(ax==='y'){mesh.scale.y=Math.max(.05,sgDrag.oScales[si].y*proj);offset.y*=proj;}
        if(ax==='z'){mesh.scale.z=Math.max(.05,sgDrag.oScales[si].z*proj);offset.z*=proj;}
        mesh.position.copy(centroid).add(offset);
        if(si===0 && window._precisionMode) _sgPrecVal=ax.toUpperCase()+': ×'+proj.toFixed(2);
      }else if(h==='su'){
        const sc=Math.max(.05,1-dy*.012);
        mesh.scale.copy(sgDrag.oScales[si]).multiplyScalar(sc);
        const offset=mesh.position.clone().sub(centroid).multiplyScalar(sc);
        mesh.position.copy(centroid).add(offset);
        if(si===0 && window._precisionMode) _sgPrecVal='×'+sc.toFixed(2);
      }
      mesh.updateMatrix();mesh.matrixAutoUpdate=false;
    });
    // Show precision readout for stroke gizmo
    var spel=document.getElementById('sg-precision');
    if(spel){
      if(window._precisionMode && _sgPrecVal){spel.textContent=_sgPrecVal;spel.style.display='';}
      else{spel.style.display='none';}
    }
    // Also show in ghud-sel card (gc-hosted mode)
    if(window._precisionMode && _sgPrecVal && window._setSelPrecision) window._setSelPrecision(_sgPrecVal);
    updateSelHighlights();sgDraw();
  }

  function sgStartDrag(p,h,clientX,clientY){

  function _rebuildStrokeMesh(s,newColor,newSz,newOp){
    var oldMat=s.mesh.matrix.clone();
    scene.remove(s.mesh);
    s.mesh.traverse(function(c){if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose();});
    var g=new THREE.Group();
    var tube=buildTube(s.pts,s.vels||computeVels(s.pts),newColor,newSz,newOp,s.flat);

    if(!s.flat){g.add(buildCap(s.pts[0],newColor,newSz,newOp));g.add(buildCap(s.pts[s.pts.length-1],newColor,newSz,newOp));}

    g.matrix.decompose(g.position,g.quaternion,g.scale);

// ================================================================
//  LOFT — persistent drawing plane from 2+ selected strokes
//  _loftGeo persists in memory for the session.
//  Cycle to 'loft' surf type to reactivate; tap ⟁ Loft again to rebuild.
//  Tap 'Lft' in surf cycle while already on loft → clears _loftGeo.
//  Cleared on newScene(). Serialises as 'plane' on save (ephemeral by design).
// ================================================================
(function(){
  // Stored loft geometry + centroid — persists until newScene() or explicit clear
  window._loftGeo = null;
  window._loftCen = null;

  // Resample a stroke's world-space points to N evenly-spaced samples
  function resampleStroke(stroke, N){
    var wpts = stroke.pts.map(function(p){return p.clone().applyMatrix4(stroke.mesh.matrix);});
    if(wpts.length < 2) return null;
    var lens = [0];
    for(var i = 1; i < wpts.length; i++) lens.push(lens[i-1] + wpts[i].distanceTo(wpts[i-1]));
    var total = lens[lens.length-1];
    if(total < 1e-6) return null;
    var result = [];
    for(var s = 0; s < N; s++){
      var t = s / (N-1) * total;
      var lo = 0, hi = lens.length-2;
      while(lo < hi){ var mid = (lo+hi)>>1; if(lens[mid+1] < t) lo=mid+1; else hi=mid; }
      var seg = lo;
      var segLen = lens[seg+1] - lens[seg];
      var alpha = segLen < 1e-10 ? 0 : (t - lens[seg]) / segLen;
      result.push(wpts[seg].clone().lerp(wpts[seg+1], alpha));
    }
    return result;
  }

  function buildLoftGeo(rails, N){
    var M = rails.length;
    var pos = [], norms = [], idx = [];
    for(var ri = 0; ri < M; ri++){
      for(var pi = 0; pi < N; pi++){
        var p = rails[ri][pi];
        pos.push(p.x, p.y, p.z);
        norms.push(0, 1, 0);
      }
    }
    for(var ri = 0; ri < M-1; ri++){
      for(var pi = 0; pi < N-1; pi++){
        var a = ri*N + pi;
        var b = ri*N + pi+1;
        var c = (ri+1)*N + pi;
        var d = (ri+1)*N + pi+1;
        idx.push(a, b, c,  b, d, c);
      }
    }
    var geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
    geo.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
    geo.setIndex(idx);
    geo.computeVertexNormals();
    return geo;
  }

  // Apply stored _loftGeo to the active surfGroup
  window._activateLoft = function(){
    if(!window._loftGeo || !window._loftCen){ toast('No loft — select 2+ strokes → ⟁ Loft'); return; }
    var geo = window._loftGeo;
    var cen = window._loftCen;
    surfPos.copy(cen);
    surfEuler.set(0,0,0);
    surfScale = 1;
    surfScaleAxes.set(1,1,1);
    surfType = 'plane';
    curPlane = 'xz';
    buildSurf();
    if(surfMesh && surfMesh.geometry){ surfMesh.geometry.dispose(); surfMesh.geometry = geo.clone(); }
    if(_frostedMesh && _frostedMesh.geometry){ _frostedMesh.geometry.dispose(); _frostedMesh.geometry = geo.clone(); }
    if(_frostedGridMesh && _frostedGridMesh.geometry){ _frostedGridMesh.geometry.dispose(); _frostedGridMesh.geometry = geo.clone(); }
    surfType = 'loft';
    surfGroup.visible = true;
    surfGroup.position.copy(surfPos);
    surfGroup.rotation.copy(new THREE.Euler(0,0,0));
    surfGroup.scale.set(1,1,1);
    // Sync all surf cycle buttons
    ['pb-cyc-surf','pb-cyc-surf2','sb-cyc-surf'].forEach(function(id){
      var b=document.getElementById(id);if(b)b.textContent='Lft';
    });
    var bsurf=document.getElementById('bsurf');if(bsurf)bsurf.classList.add('on');
    markDirty();
    setMode('draw');
  };

  // Clear the stored loft and fall back to none
  window._clearLoft = function(){
    if(window._loftGeo){ window._loftGeo.dispose(); window._loftGeo=null; }
    window._loftCen = null;
    surfGroup.visible = false;
    surfType = 'none';
    ['pb-cyc-surf','pb-cyc-surf2','sb-cyc-surf'].forEach(function(id){
      var b=document.getElementById(id);if(b)b.textContent='Off';
    });
    var bsurf=document.getElementById('bsurf');if(bsurf)bsurf.classList.remove('on');
    markDirty();
    setMode('select');
    toast('Loft cleared · select strokes to build new loft');
  };

  function loftFromSelection(){
    if(selectedStrokes.length < 2){ toast('Select 2+ strokes to loft'); return; }
    var N = 48;
    var rails = [];
    for(var i = 0; i < selectedStrokes.length; i++){
      var r = resampleStroke(selectedStrokes[i], N);
      if(!r){ toast('Stroke too short to loft'); return; }
      rails.push(r);
    }

    var cen = new THREE.Vector3();
    var total = 0;
    rails.forEach(function(r){ r.forEach(function(p){ cen.add(p); total++; }); });
    cen.divideScalar(total);

    var geo = buildLoftGeo(rails, N);
    var posArr = geo.attributes.position.array;
    for(var i = 0; i < posArr.length; i+=3){
      posArr[i]   -= cen.x;
      posArr[i+1] -= cen.y;
      posArr[i+2] -= cen.z;
    }
    geo.attributes.position.needsUpdate = true;
    geo.computeVertexNormals();

    // Dispose old stored geo if present
    if(window._loftGeo){ window._loftGeo.dispose(); }
    window._loftGeo = geo;
    window._loftCen = cen.clone();

    // Activate immediately
    window._activateLoft();
    clearSelection();
    toast('Loft built · draw on it · cycle Lft again to clear');
  }

  // sg-loft button: build from selection
  document.getElementById('sg-loft').addEventListener('click', function(){
    // If already on loft with a stored geo, tapping again clears it
    if(surfType === 'loft' && selectedStrokes.length === 0 && window._loftGeo){
      window._clearLoft();
    } else {
      loftFromSelection();
    }
  });
})();


// ================================================================
//  PRIMITIVES / REF OBJECTS — 3D reference shapes on a Ref layer
//  Hard cap: 10 objects. Per-page storage. Layer index 4.
// ================================================================
(function(){
  var PRIM_MAX = 20;
  var primitives = [];
  var _primSelectMode = false;
  var _selectedPrim = null;
  var _refLayerVisible = true;
  var _primIdCounter = 1;

  // Expose for page switch / save / load
  window._primitives = primitives;
  window._primSelectMode = false;

  // ── Precision mode (show distance/angle during transforms) ──
  // Uses window._precisionMode set by ruler popup toggle

  // ── Shape icons for strip rows ──
  var SHAPE_ICONS = {box:'◻',sphere:'○',cylinder:'◎',cone:'△',plane:'▭',loft:'~'};

  // ── Geometry factories ──
  function makeGeometry(type){
    if(type==='box') return new THREE.BoxGeometry(2,2,2);
    if(type==='sphere') return new THREE.SphereGeometry(1.2,24,16);
    if(type==='cylinder') return new THREE.CylinderGeometry(1,1,2.5,28);
    if(type==='cone') return new THREE.ConeGeometry(1,2.5,28);
    if(type==='plane') return new THREE.PlaneGeometry(4,4);
    return new THREE.BoxGeometry(2,2,2);
  }

  // Base dimensions (unscaled) for each prim type
  function _getPrimBaseSize(type){
    if(type==='box') return {x:2,y:2,z:2};
    if(type==='sphere') return {x:2.4,y:2.4,z:2.4};
    if(type==='cylinder') return {x:2,y:2.5,z:2};
    if(type==='cone') return {x:2,y:2.5,z:2};
    if(type==='plane') return {x:4,y:4,z:0};
    return {x:2,y:2,z:2};
  }

  function makePrimGroup(geo, color, opacity){
    var op = opacity != null ? opacity : 1;
    var isTransparent = op < 1;
    var mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(color || '#ffffff'),
      transparent: isTransparent, opacity: op,
      depthWrite: !isTransparent,
      side: THREE.DoubleSide,
      roughness: 0.85, wireframe: false
    });
    var mesh = new THREE.Mesh(geo, mat);
    var edgeGeo = new THREE.EdgesGeometry(geo, 15);
    // Subtle outline: darken the fill color for edges
    var ec = new THREE.Color(color || '#ffffff');
    ec.r = Math.max(0, ec.r * 0.55);
    ec.g = Math.max(0, ec.g * 0.55);
    ec.b = Math.max(0, ec.b * 0.55);
    var edgeMat = new THREE.LineBasicMaterial({
      color: ec, transparent: true, opacity: 0.4, depthTest: true
    });
    var edges = new THREE.LineSegments(edgeGeo, edgeMat);
    var grp = new THREE.Group();
    mesh.renderOrder = 2;
    edges.renderOrder = 3;
    grp.add(mesh);
    grp.add(edges);
    return grp;
  }

  // ── Add primitive ──
  function addPrimitive(type){
    if(primitives.length >= PRIM_MAX){ toast('Ref cap reached ('+PRIM_MAX+')'); return; }
    var geo = makeGeometry(type);
    var grp = makePrimGroup(geo, '#ffffff');
    // Spawn at surfGroup position + small random offset
    grp.position.copy(surfGroup.position);
    grp.position.x += (Math.random()-0.5)*0.5;
    grp.position.y += (Math.random()-0.5)*0.5;
    grp.position.z += (Math.random()-0.5)*0.5;
    scene.add(grp);
    var entry = {
      id: _primIdCounter++,
      type: type,
      mesh: grp,
      color: '#ffffff',
      opacity: 1,
      visible: true,

      _rowEl: null
    };

    addPrimRow(entry);
    updatePrimCount();
    showRefLayerRow();
    pushUndo({type:'prim_add', prim: entry});
    selectPrimitive(entry);
    markDirty();
  }

  // ── Remove primitive ──
  function removePrimitive(id){
    var idx = -1;
    for(var i=0;i<primitives.length;i++){if(primitives[i].id===id){idx=i;break;}}
    if(idx===-1) return;
    var entry = primitives[idx];
    if(_selectedPrim && _selectedPrim.id === id) deselectPrimitive();
    scene.remove(entry.mesh);
    entry.mesh.traverse(function(c){if(c.geometry)c.geometry.dispose();if(c.material)c.material.dispose();});
    primitives.splice(idx,1);
    if(entry._rowEl && entry._rowEl.parentNode) entry._rowEl.parentNode.removeChild(entry._rowEl);
    updatePrimCount();
    showRefLayerRow();
    pushUndo({type:'prim_delete', prim: entry, index: idx});
    markDirty();
  }

  // ── Duplicate primitive ──
  function duplicatePrimitive(prim){
    if(primitives.length >= PRIM_MAX){ toast('Ref cap reached ('+PRIM_MAX+')'); return; }
    var geo;
    if(prim.type === 'loft' && prim.profilePts){
      // Reconstruct loft geometry
      var N = prim.profilePts[0] ? prim.profilePts[0].length : 48;
      var M = prim.profilePts.length;
      var pos = [], norms = [], idx = [];
      for(var ri = 0; ri < M; ri++){
        for(var pi = 0; pi < N; pi++){
          var pt = prim.profilePts[ri][pi];
          pos.push(pt[0], pt[1], pt[2]);
          norms.push(0, 1, 0);
        }
      }
      for(var ri = 0; ri < M-1; ri++){
        for(var pi = 0; pi < N-1; pi++){
          var a = ri*N + pi, b = ri*N + pi+1, c = (ri+1)*N + pi, d = (ri+1)*N + pi+1;
          idx.push(a, b, c, b, d, c);
        }
      }
      geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
      geo.setAttribute('normal', new THREE.Float32BufferAttribute(norms, 3));
      geo.setIndex(idx);
      geo.computeVertexNormals();
    } else {
      geo = makeGeometry(prim.type);
    }
    var grp = makePrimGroup(geo, prim.color, prim.opacity);
    grp.position.copy(prim.mesh.position);
    grp.position.x += 0.5;
    grp.quaternion.copy(prim.mesh.quaternion);
    grp.scale.copy(prim.mesh.scale);
    grp.updateMatrix(); grp.matrixAutoUpdate = false;
    scene.add(grp);
    var entry = {
      id: _primIdCounter++,
      type: prim.type,
      mesh: grp,
      color: prim.color,
      opacity: prim.opacity != null ? prim.opacity : 1,
      visible: true,

      _rowEl: null
    };

    primitives.push(entry);
    addPrimRow(entry);
    updatePrimCount();
    showRefLayerRow();
    pushUndo({type:'prim_add', prim: entry});
    selectPrimitive(entry);
    markDirty();

  function syncPgColors(hex){

  // ── Color ──
  function setPrimColor(prim, hex){

  // ── Use as Plane ──

  // ── Raycast hook: s2w checks prim meshes when _primsAsPlane is on ──
  window._primRaycast = function(raycaster){
    if(!_primsAsPlane) return null;
    var bestHit = null;
    for(var i = 0; i < primitives.length; i++){
      var p = primitives[i];
      if(!p.mesh.visible) continue;
      p.mesh.traverse(function(c){
        if(!c.isMesh) return;
        var prev = c.material.side;
        c.material.side = THREE.DoubleSide;
        var hits = raycaster.intersectObject(c, false);
        c.material.side = prev;
        if(hits.length > 0 && (!bestHit || hits[0].distance < bestHit.distance)){
          bestHit = hits[0];
        }
      });
    }
    return bestHit;
  };

  // ── Ref layer visibility ──
  function setRefLayerVisible(v){
    _refLayerVisible = v;
    for(var i=0;i<primitives.length;i++){
      primitives[i].mesh.visible = v && primitives[i].visible;
    }
    markDirty();
  }

  // ── Raycast against primitives ──
  var _primRaycaster = new THREE.Raycaster();
  function findNearestPrimitive(px, py){
    _refreshRect();
    var r = _cachedRect;
    var ndcX = ((px - r.left) / r.width) * 2 - 1;
    var ndcY = -((py - r.top) / r.height) * 2 + 1;
    var ac = activeCam();
    _primRaycaster.setFromCamera(new THREE.Vector2(ndcX, ndcY), ac);
    var bestPrim = null, bestDist = Infinity;
    for(var i=0;i<primitives.length;i++){
      var p = primitives[i];
      if(!p.mesh.visible) continue;
      // Bounding sphere pre-check
      p.mesh.traverse(function(c){
        if(!c.isMesh) return;
        if(!c.geometry.boundingSphere) c.geometry.computeBoundingSphere();
      });
      var hits = _primRaycaster.intersectObject(p.mesh, true);
      if(hits.length > 0 && hits[0].distance < bestDist){
        bestDist = hits[0].distance;
        bestPrim = p;
      }
    }
    return bestPrim;
  }

  // ── Pgizmo positioning ──
  var _pgizmoDragged = false;
  function positionPrimGizmo(){
    var pg = document.getElementById('pgizmo');
    if(!_pgizmoDragged){
      // Top-right, below bhide+bprims+sc-fab stack (avoids overlap with sidecol)
      pg.style.left = '';
      pg.style.right = '8px';
      pg.style.top = '120px';
    }
    pg.style.maxHeight = 'calc(100dvh - 120px)';
  }

  // ── Pgizmo drag handle ──
  (function(){
    var pg = document.getElementById('pgizmo');
    var handle = document.getElementById('pgizmo-handle');
    if(!pg || !handle) return;
    var dragState = null;
    function onStart(e){
      e.preventDefault(); e.stopPropagation();
      var src = e.touches ? e.touches[0] : e;
      var r = pg.getBoundingClientRect();
      dragState = {ox: src.clientX - r.left, oy: src.clientY - r.top};
    }
    function onMove(e){
      if(!dragState) return;
      e.preventDefault();
      var src = e.touches ? e.touches[0] : e;
      var nx = src.clientX - dragState.ox;
      var ny = src.clientY - dragState.oy;
      var sw = pg.offsetWidth, sh = pg.offsetHeight;
      nx = Math.max(0, Math.min(window.innerWidth - sw, nx));
      ny = Math.max(0, Math.min(window.innerHeight - sh, ny));
      pg.style.right = ''; pg.style.left = nx + 'px'; pg.style.top = ny + 'px';
      _pgizmoDragged = true;
    }
    function onEnd(){ dragState = null; }
    handle.addEventListener('touchstart', onStart, {passive: false});
    handle.addEventListener('touchmove', onMove, {passive: false});
    handle.addEventListener('touchend', onEnd);
    handle.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', function(e){ if(dragState) onMove(e); });
    document.addEventListener('mouseup', onEnd);
  })();

  // ── Pgizmo canvas — unified gizmo design (matches sgizmo exactly) ──
  var pgc = document.getElementById('pg-gc');
  var pgCtx = pgc.getContext('2d');
  var PG_W = pgc.width, PG_H = pgc.height, PG_CX = PG_W/2, PG_CY = PG_H/2;
  var WORLD = {x: new THREE.Vector3(1,0,0), y: new THREE.Vector3(0,1,0), z: new THREE.Vector3(0,0,1)};
  var PG_COLORS = {x:'#e03040', y:'#22bb55', z:'#3377ee'};
  var pgDrag = null, pgHov = null;
  var _pgMode = 'all'; // 'all','move','rotate','scale'
  var _pgScaleMode = false;
  var _pgGrabT = 0;

  // Proportional sizing (same ratios as sgizmo)
  var _PG_R = Math.min(PG_CX, PG_CY);
  var PG_RING_R2 = Math.round(_PG_R * 0.68);
  var PG_GAP2 = 0.22;
  var PG_ARC_BOUNDS2 = {x:['z','y'], y:['z','x'], z:['x','y']};
  var PG_ARROW = Math.round(_PG_R * 0.76);
  var PG_HEAD_S = Math.round(_PG_R * 0.10);
  var PG_HEAD_L = Math.round(_PG_R * 0.14);
  var PG_BOX_S = Math.round(_PG_R * 0.10);
  var PG_CENTER_R = Math.round(_PG_R * 0.16);
  var _pgLayout = null;

  function pgGetQuat(){
    return _selectedPrim ? _selectedPrim.mesh.quaternion.clone() : new THREE.Quaternion();
  }

  function _pgComputeLayout(){
    var q = pgGetQuat();
    var ac = activeCam();
    var cen = new THREE.Vector3();
    if(_selectedPrim) _selectedPrim.mesh.getWorldPosition(cen);
    var cv = cen.clone().project(ac);
    var camDir = new THREE.Vector3().subVectors(ac.position, cen).normalize();
    var axisAngles = {}, flipped = {};
    ['x','y','z'].forEach(function(ax){
      var dir = WORLD[ax].clone().applyQuaternion(q).normalize();
      flipped[ax] = dir.dot(camDir) < 0;
      if(flipped[ax]) dir.negate();
      var tipV = cen.clone().addScaledVector(dir, 1).project(ac);
      axisAngles[ax] = Math.atan2(-(tipV.y - cv.y), (tipV.x - cv.x));
    });
    function N(a){ return ((a % (Math.PI*2)) + Math.PI*2) % (Math.PI*2); }
    var arcs = {};
    ['x','y','z'].forEach(function(ax){
      var bA = PG_ARC_BOUNDS2[ax][0], bB = PG_ARC_BOUNDS2[ax][1];
      var s = N(axisAngles[bA]), e = N(axisAngles[bB]), own = N(axisAngles[ax]);
      var spanCCW = (e - s + Math.PI*2) % (Math.PI*2);
      var ownInCCW = ((own - s + Math.PI*2) % (Math.PI*2)) < spanCCW;
      var arcStart, arcEnd;
      if(!ownInCCW){ arcStart = s + PG_GAP2; arcEnd = s + spanCCW - PG_GAP2; }
      else { arcStart = e + PG_GAP2; arcEnd = e + (Math.PI*2 - spanCCW) - PG_GAP2; }
      arcs[ax] = {start: arcStart, end: arcEnd};
    });
    _pgLayout = {cx: PG_CX, cy: PG_CY, axisAngles: axisAngles, flipped: flipped, arcs: arcs};
  }

  function pgDraw(){
    // Freeze layout during rotate drag
    if(pgDrag && pgDrag.h && pgDrag.h[0] === 'r' && pgDrag.frozenLayout){
      _pgLayout = pgDrag.frozenLayout;
    } else {
      _pgComputeLayout();
    }
    pgCtx.clearRect(0, 0, PG_W, PG_H);
    if(!_pgLayout || !_selectedPrim) return;
    var cx = _pgLayout.cx, cy = _pgLayout.cy;
    var axisAngles = _pgLayout.axisAngles, arcs = _pgLayout.arcs, flipped = _pgLayout.flipped;
    var activeDrag = pgDrag ? pgDrag.h : null;
    var showArcs = (_pgMode === 'all' || _pgMode === 'rotate');
    var showArrows = (_pgMode === 'all' || _pgMode === 'move' || _pgMode === 'scale');

    ['x','y','z'].forEach(function(ax){
      var col = PG_COLORS[ax], arc = arcs[ax], angle = axisAngles[ax];
      var ax2c = Math.cos(angle), ay2s = Math.sin(angle);
      var arcHlit = (pgHov === 'r'+ax) || (activeDrag === 'r'+ax);
      var arwHlit = (pgHov === 'a'+ax || pgHov === 's'+ax) || (activeDrag === 'a'+ax || activeDrag === 's'+ax);

      // Arc
      if(showArcs){
        pgCtx.save();
        if(arcHlit){ pgCtx.shadowColor = col; pgCtx.shadowBlur = 9; }
        pgCtx.beginPath(); pgCtx.arc(cx, cy, PG_RING_R2, arc.start, arc.end);
        pgCtx.strokeStyle = col;
        pgCtx.lineWidth = arcHlit ? Math.round(_PG_R*0.09) : Math.round(_PG_R*0.065);
        pgCtx.lineCap = 'round';
        pgCtx.globalAlpha = arcHlit ? 1 : 0.45; pgCtx.stroke();
        pgCtx.restore();
      }

      // Shaft + head
      if(!showArrows) return;
      var shaftS = PG_RING_R2 * 0.55;
      var ex = cx + ax2c*PG_ARROW, ey = cy + ay2s*PG_ARROW;
      pgCtx.save();
      if(arwHlit){ pgCtx.shadowColor = col; pgCtx.shadowBlur = 7; }
      pgCtx.globalAlpha = arwHlit ? 1 : 0.85;
      pgCtx.strokeStyle = col;
      pgCtx.lineWidth = arwHlit ? Math.round(_PG_R*0.055) : Math.round(_PG_R*0.04);
      pgCtx.lineCap = 'round';
      pgCtx.beginPath(); pgCtx.moveTo(cx+ax2c*shaftS, cy+ay2s*shaftS); pgCtx.lineTo(ex, ey); pgCtx.stroke();
      pgCtx.beginPath(); pgCtx.arc(cx+ax2c*shaftS, cy+ay2s*shaftS, arwHlit?Math.round(_PG_R*0.055):Math.round(_PG_R*0.03), 0, Math.PI*2);
      pgCtx.fillStyle = col; pgCtx.fill();
      if(_pgScaleMode){
        var bx = ex + ax2c*(PG_HEAD_L*0.5), by = ey + ay2s*(PG_HEAD_L*0.5);
        var hs = arwHlit ? PG_BOX_S*1.2 : PG_BOX_S;
        pgCtx.save(); pgCtx.translate(bx, by); pgCtx.rotate(angle + Math.PI/4);

      pgCtx.textAlign = 'center'; pgCtx.textBaseline = 'middle';
      pgCtx.fillStyle = col; pgCtx.globalAlpha = arwHlit ? 1 : 0.88;
      var lblDist = PG_ARROW + PG_HEAD_L + Math.round(_PG_R*0.06);
      var slx = cx+ax2c*lblDist, sly = cy+ay2s*lblDist;
      var sm = 6; slx = Math.max(sm, Math.min(PG_W-sm, slx)); sly = Math.max(sm, Math.min(PG_H-sm, sly));

    // Center

  function pgHitTest(x, y, isTouch){
    if(!_selectedPrim) return null;
    _pgComputeLayout();
    if(!_pgLayout) return null;
    var pgl = _pgLayout;
    var dx = x - pgl.cx, dy = y - pgl.cy;
    var dist = Math.sqrt(dx*dx + dy*dy);
    var sang = Math.atan2(dy, dx);
    var axes = ['x','y','z'];
    var hitArcs = (_pgMode === 'all' || _pgMode === 'rotate');
    var hitArrows = (_pgMode === 'all' || _pgMode === 'move');
    var hitScale = (_pgMode === 'all' || _pgMode === 'scale');
    var arcTol = isTouch ? 18 : 9;
    var pgW = isTouch ? 48 : 14;
    var inArcZone = Math.abs(dist - PG_RING_R2) < arcTol;
    // Center (uniform scale)
    if((_pgMode === 'all' || _pgMode === 'scale') && dist <= PG_CENTER_R + (isTouch ? 8 : 0)) return 'su';
    // Touch: test arrows first outside arc zone
    if(isTouch && (hitArrows || hitScale) && !inArcZone){
      for(var sk = 0; sk < axes.length; sk++){
        var sak = axes[sk], sangk = pgl.axisAngles[sak];
        var sacsk = Math.cos(sangk), sask = Math.sin(sangk);
        var salk = dx*sacsk + dy*sask;
        var sperk = Math.abs(dx*(-sask) + dy*sacsk);
        if(salk >= PG_RING_R2*0.4 && salk <= PG_ARROW + PG_HEAD_L && sperk < pgW){
          var useScaleK = (_pgMode === 'scale') || (_pgMode === 'all' && _pgScaleMode);
          return useScaleK ? 's'+sak : 'a'+sak;
        }
      }
    }
    // Arc hits
    if(hitArcs && inArcZone){
      function normA(a){ return ((a % (Math.PI*2)) + Math.PI*2) % (Math.PI*2); }
      for(var si = 0; si < axes.length; si++){
        var sax2 = axes[si], sarc2 = pgl.arcs[sax2];
        var ss2 = normA(sarc2.start), se2 = normA(sarc2.end), sa2 = normA(sang);
        var shit2 = (se2 >= ss2) ? (sa2 >= ss2 && sa2 <= se2) : (sa2 >= ss2 || sa2 <= se2);
        if(shit2){ _pgGrabT = sang; return 'r'+sax2; }
      }
    }
    // Arrow / scale hits
    if(hitArrows || hitScale){
      for(var sj = 0; sj < axes.length; sj++){
        var sax3 = axes[sj], sang3 = pgl.axisAngles[sax3];
        var sacos = Math.cos(sang3), sasin = Math.sin(sang3);
        var salong = dx*sacos + dy*sasin;
        var saperp = Math.abs(dx*(-sasin) + dy*sacos);
        if(salong >= PG_RING_R2*0.4 && salong <= PG_ARROW + PG_HEAD_L && saperp < pgW){
          var useScale = (_pgMode === 'scale') || (_pgMode === 'all' && _pgScaleMode);
          return useScale ? 's'+sax3 : 'a'+sax3;
        }
      }
    }
    return null;
  }

  function pgGetPos(e){
    var r = pgc.getBoundingClientRect();
    var src = e.touches ? e.touches[0] : e;
    return {x: (src.clientX - r.left) * (148 / r.width), y: (src.clientY - r.top) * (148 / r.height)};
  }

  function pgApplyDrag(p){
    if(!pgDrag || !_selectedPrim) return;
    var dx = p.x - pgDrag.sx, dy = p.y - pgDrag.sy, h = pgDrag.h;
    var mesh = _selectedPrim.mesh;

    // Restore from saved start
    mesh.position.copy(pgDrag.oPos);
    mesh.quaternion.copy(pgDrag.oQuat);
    mesh.scale.copy(pgDrag.oScale);

    var _precVal = '';
    var _pgFL = pgDrag.frozenLayout || _pgLayout;

    if(h.startsWith('a')){
      var ax = h[1];
      var sgang = _pgFL ? _pgFL.axisAngles[ax] : 0;
      var proj = (dx*Math.cos(sgang) + dy*Math.sin(sgang)) * 0.028;
      var dir = WORLD[ax].clone().applyQuaternion(pgDrag.oQuat).normalize();
      if(_pgFL && _pgFL.flipped[ax]) dir.negate();
      mesh.position.addScaledVector(dir, proj);
      if(window._precisionMode){
        _precVal = ax.toUpperCase()+' Δ'+formatDist(proj);
      }
    } else if(h.startsWith('r')){
      var ax = h[1];
      var grabAngle = pgDrag.grabT;
      var tx = -Math.sin(grabAngle), ty = Math.cos(grabAngle);
      var proj = (dx*tx + dy*ty) * 0.022;
      var angle = ax === 'z' ? -proj : proj;
      var q = new THREE.Quaternion();
      if(ax==='x') q.setFromAxisAngle(new THREE.Vector3(1,0,0), angle);
      if(ax==='y') q.setFromAxisAngle(new THREE.Vector3(0,1,0), angle);
      if(ax==='z') q.setFromAxisAngle(new THREE.Vector3(0,0,1), angle);
      mesh.quaternion.premultiply(q);
      if(window._precisionMode){
        var deg = (angle * 180 / Math.PI);
        _precVal = ax.toUpperCase()+': '+deg.toFixed(1)+'°';
      }
    } else if(h.startsWith('s') && h !== 'su'){
      var ax = h[1];
      var sgang = _pgFL ? _pgFL.axisAngles[ax] : 0;
      var proj = 1 + (dx*Math.cos(sgang) + dy*Math.sin(sgang)) * 0.015;
      proj = Math.max(0.05, proj);
      if(ax==='x') mesh.scale.x = pgDrag.oScale.x * proj;
      if(ax==='y') mesh.scale.y = pgDrag.oScale.y * proj;
      if(ax==='z') mesh.scale.z = pgDrag.oScale.z * proj;
      if(window._precisionMode){
        var _bs = _getPrimBaseSize(_selectedPrim.type);
        var sx = mesh.scale.x * _bs.x, sy = mesh.scale.y * _bs.y, sz = mesh.scale.z * _bs.z;
        _precVal = ax.toUpperCase()+': ×'+proj.toFixed(2)+' · '+formatSize(sx,sy,sz);
      }
    } else if(h === 'su'){
      var sc = Math.max(0.05, 1 - dy * 0.012);
      mesh.scale.copy(pgDrag.oScale).multiplyScalar(sc);
      if(window._precisionMode){
        var _bs = _getPrimBaseSize(_selectedPrim.type);
        var sx = mesh.scale.x * _bs.x, sy = mesh.scale.y * _bs.y, sz = mesh.scale.z * _bs.z;
        _precVal = '×'+sc.toFixed(2)+' · '+formatSize(sx,sy,sz);
      }
    }
    mesh.updateMatrix(); mesh.matrixAutoUpdate = false;

    // Show precision readout
    var pel = document.getElementById('pg-precision');
    if(pel){
      if(window._precisionMode && _precVal){
        pel.textContent = _precVal;
        pel.style.display = '';
      } else {
        pel.style.display = 'none';
      }
    }
    // Also show in ghud-sel card (gc-hosted mode)
    if(window._precisionMode && _precVal && window._setSelPrecision) window._setSelPrecision(_precVal);

    pgDraw();
    markDirty();
  }

  function pgStartDrag(p, h, clientX, clientY){
    if(!h || !_selectedPrim) return;
    var mesh = _selectedPrim.mesh;

      frozenLayout: _pgLayout ? JSON.parse(JSON.stringify(_pgLayout)) : null,
      _scx: clientX, _scy: clientY};
    pgHov = h; pgDraw();
  }
